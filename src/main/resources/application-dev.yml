spring:
  datasource:
    url: jdbc:mysql://localhost:3306/expygen?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
    username: expygen
    password: expygen123

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  thymeleaf:
    cache: false

evolution:
  api:
    url: ${EVOLUTION_API_URL:http://localhost:8081}
    key: ${EVOLUTION_API_KEY:expygen-whatsapp-key}

server:
  port: 8080

app:
  security:
    enforce-single-session: false


# Logging Configuration
logging:
  level:
    com:
      expygen:
        admin: DEBUG
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
