spring:
  application:
    name: hisaablite
  config:
    import: optional:application-secrets.yml

  profiles:
    active: dev
  
  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true
  mvc:
    favicon:
      enabled: true

# Evolution API
evolution:
  api:
    url: http://localhost:8081
    key: ${evolution.api.key}
