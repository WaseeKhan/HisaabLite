<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">RxArogya mark</title>
  <desc id="desc">Abstract medical workflow symbol with orbit and H letterform.</desc>
  <defs>
