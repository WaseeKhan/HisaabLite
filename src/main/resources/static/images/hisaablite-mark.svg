    <rect x="55" y="23" width="11" height="39" rx="5.5" fill="#1d232c"/>
    <rect x="39" y="35" width="16" height="11" rx="5.5" fill="url(#cross)"/>

    <rect x="63" y="7" width="14" height="4.5" rx="2.25" fill="url(#cross)"/>
    <rect x="67.75" y="2.25" width="4.5" height="14" rx="2.25" fill="url(#cross)"/>
