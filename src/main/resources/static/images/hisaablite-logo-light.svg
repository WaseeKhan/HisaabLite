    <circle cx="12" cy="63" r="4.6" fill="#f7a24d"/>
    <circle cx="84" cy="21" r="4.6" fill="#f7a24d"/>

    <rect x="27" y="20" width="10" height="34" rx="5" fill="#f8fafc"/>
    <rect x="50" y="20" width="10" height="34" rx="5" fill="#f8fafc"/>
    <rect x="37" y="31" width="14" height="10" rx="5" fill="url(#cross)"/>

    <rect x="57" y="4" width="13" height="4" rx="2" fill="url(#cross)"/>
    <rect x="61.5" y="-0.5" width="4" height="13" rx="2" fill="url(#cross)"/>
  </g>

  <text x="104" y="48" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" letter-spacing="-1.1">hisaablite</text>
  <text x="106" y="70" fill="#aeb9ca" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="600" letter-spacing="2.4">MEDICAL WORKFLOW DESK</text>
