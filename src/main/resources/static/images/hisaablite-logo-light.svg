<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 96" role="img" aria-labelledby="title desc">
  <title id="title">RxArogya logo light</title>
  <desc id="desc">Light wordmark for dark backgrounds.</desc>
  <defs>
    <linearGradient id="orbit" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#ffb868"/>
      <stop offset="100%" stop-color="#f28727"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78a8ff"/>
