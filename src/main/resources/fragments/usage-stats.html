<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Usage Stats Card Fragment -->
    <div th:fragment="usageCard(usageStats)" class="usage-stats-card" 
         th:if="${usageStats != null and !usageStats.isEmpty()}">
        
        <div class="card-header">
            <h5>
                <i class="fas fa-chart-pie me-2"></i>
                <span th:text="${usageStats.planName}">FREE</span> Plan Usage
            </h5>
            <span class="badge" th:classappend="${usageStats.subscriptionActive} ? 'bg-success' : 'bg-danger'"
                  th:text="${usageStats.subscriptionActive} ? 'Active' : 'Expired'">Active</span>
        </div>
        
        <div class="card-body">
            <!-- Users Progress -->
            <div class="mb-4" th:if="${usageStats.maxUsers != 'Unlimited'}">
                <div class="d-flex justify-content-between mb-1">
                    <span>Team Members</span>
                    <span>
                        <span th:text="${usageStats.currentUsers}">2</span> / 
                        <span th:text="${usageStats.maxUsers}">5</span>
                    </span>
                </div>
                <div class="progress" style="height: 8px;">
                    <div class="progress-bar" 
                         th:classappend="${usageStats.usersPercentage > 90} ? 'bg-danger' : 
                                        (${usageStats.usersPercentage > 70} ? 'bg-warning' : 'bg-success')"
                         th:style="'width: ' + ${usageStats.usersPercentage} + '%'"
                         th:attr="aria-valuenow=${usageStats.usersPercentage}">
                    </div>
                </div>
                <small class="text-muted" th:if="${usageStats.usersRemaining > 0}">
                    <i class="fas fa-user-plus me-1"></i>
                    <span th:text="${usageStats.usersRemaining}">3</span> more users can be added
                </small>
                <small class="text-danger" th:if="${usageStats.usersRemaining == 0}">
                    <i class="fas fa-exclamation-triangle me-1"></i>
                    User limit reached
                </small>
            </div>
            
            <!-- Products Progress -->
            <div class="mb-4" th:if="${usageStats.maxProducts != 'Unlimited'}">
                <div class="d-flex justify-content-between mb-1">
                    <span>Products</span>
                    <span>
                        <span th:text="${usageStats.currentProducts}">45</span> / 
                        <span th:text="${usageStats.maxProducts}">200</span>
                    </span>
                </div>
                <div class="progress" style="height: 8px;">
                    <div class="progress-bar" 
                         th:classappend="${usageStats.productsPercentage > 90} ? 'bg-danger' : 
                                        (${usageStats.productsPercentage > 70} ? 'bg-warning' : 'bg-success')"
                         th:style="'width: ' + ${usageStats.productsPercentage} + '%'">
                    </div>
                </div>
                <small class="text-muted" th:if="${usageStats.productsRemaining > 0}">
                    <i class="fas fa-box me-1"></i>
                    <span th:text="${usageStats.productsRemaining}">155</span> more products can be added
                </small>
                <small class="text-danger" th:if="${usageStats.productsRemaining == 0}">
                    <i class="fas fa-exclamation-triangle me-1"></i>
                    Product limit reached
                </small>
            </div>
            
            <!-- Unlimited Plan Message -->
            <div class="text-center py-3" th:if="${usageStats.maxUsers == 'Unlimited' and usageStats.maxProducts == 'Unlimited'}">
                <i class="fas fa-infinity fa-2x text-primary mb-2"></i>
                <p class="mb-0">Unlimited users & products in your <strong th:text="${usageStats.planName}">ENTERPRISE</strong> plan</p>
            </div>
            
            <!-- Expiry Info -->
            <div class="mt-3 p-2 rounded" 
                 th:classappend="${usageStats.daysRemaining != null and usageStats.daysRemaining < 7} ? 'bg-warning bg-opacity-25' : 'bg-light'"
                 th:if="${usageStats.expiryDate != null}">
                <small>
                    <i class="far fa-calendar-alt me-1"></i>
                    <span th:if="${usageStats.daysRemaining == null}">No expiry date</span>
                    <span th:if="${usageStats.daysRemaining != null and usageStats.daysRemaining > 0}">
                        Expires in <strong th:text="${usageStats.daysRemaining}">15</strong> days
                    </span>
                    <span th:if="${usageStats.daysRemaining != null and usageStats.daysRemaining == 0}" class="text-danger">
                        <strong>Expired today</strong>
                    </span>
                    <span th:if="${usageStats.daysRemaining != null and usageStats.daysRemaining < 0}" class="text-danger">
                        <strong>Expired</strong>
                    </span>
                </small>
            </div>
            
            <!-- Upgrade Button -->
            <div class="text-center mt-3" th:if="${usageStats.planName != 'ENTERPRISE'}">
                <a href="/upgrade" class="btn btn-sm btn-outline-primary">
                    <i class="fas fa-rocket me-1"></i> Upgrade Plan
                </a>
            </div>
        </div>
    </div>
</body>
</html>
