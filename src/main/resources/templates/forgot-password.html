<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Forgot Password • HisaabLite</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAA/0lEQVR4AcXBsU0DQRBA0T8LInRCB1RAK7RADVRABVigFhqiIlrhhmiAAG0J0EpuVkaSNT7fzO6+5kaAp0vykCwlS8lSspQsJUvJUrKULCVLyVKylCwlS8lSspQsJUvJUrKULCVLyVKylCwlS8lSspQsJUvJUrKULCVLyVKylCwlS8lSspQsJUvJUrKULCVLyVKylCwlS8lSspQsJUvJUrKULCVLyVKylCwlS8lSspQsJUvJUrKULCVLyVKylCwlS8lSspQsJUvJUrKULCVLyVKylCwlS8lSspQsJUvJUrKULCVLyVKylCwlS8lSspQsJUvJUrKULCVLyVICgv5gT8e/jQAAAABJRU5ErkJggg==">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f3f4f6;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== NAVBAR (COMPACT - SAME AS LANDING) ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 48px;
            background: white;
            border-bottom: 1px solid #e9eef2;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: #0f172a;
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .logo-text {
            font-weight: 600;
            font-size: 16px;
            color: #0f172a;
        }

        .nav-links {
            display: flex;
            gap: 12px;
        }

        .nav-links a {
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .nav-links a.login {
            color: #5b6778;
        }

        .nav-links a.login:hover {
            background: #f1f5f9;
        }

        .nav-links a.register {
            background: #0f172a;
            color: white;
        }

        /* ===== MAIN CONTENT (COMPACT) ===== */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        .forgot-wrapper {
            width: 100%;
            max-width: 380px;
        }

        /* ===== FORGOT CARD (COMPACT) ===== */
        .forgot-card {
            background: white;
            border-radius: 20px;
            padding: 30px 28px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid #edf2f7;
        }

        .forgot-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .forgot-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .forgot-header h2 i {
            color: #2563eb;
            font-size: 20px;
        }

        .forgot-header p {
            font-size: 13px;
            color: #5b6778;
        }

        /* ===== MESSAGES (COMPACT) ===== */
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .message.success {
            background: #e6f7e6;
            color: #059669;
            border: 1px solid #bbf7d0;
        }

        .message.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fee2e2;
        }

        .message i {
            font-size: 16px;
        }

        /* ===== FORM (COMPACT) ===== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 11px;
            font-weight: 600;
            color: #5b6778;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: block;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 14px;
            color: #94a3b8;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 13px;
            background: #fafbfc;
            transition: all 0.15s;
        }

        .form-group input:focus {
            border-color: #2563eb;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
        }

        .form-group input::placeholder {
            color: #a0aec0;
            font-size: 12px;
        }

        /* ===== BUTTON (COMPACT) ===== */
        .btn-reset {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.15s;
            margin-bottom: 16px;
        }

        .btn-reset:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }

        /* ===== BACK LINK (COMPACT) ===== */
        .back-link {
            text-align: center;
        }

        .back-link a {
            text-decoration: none;
            color: #5b6778;
            font-size: 12px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 30px;
            transition: all 0.15s;
        }

        .back-link a:hover {
            background: #f1f5f9;
            color: #2563eb;
        }

        .back-link a i {
            font-size: 11px;
        }

        /* ===== FOOTER (COMPACT - SAME AS LANDING) ===== */
        .footer {
            background: white;
            border-top: 1px solid #e9eef2;
            padding: 30px 48px 20px;
            margin-top: auto;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-logo .logo-icon {
            width: 28px;
            height: 28px;
            font-size: 12px;
        }

        .footer-logo span {
            font-weight: 500;
            color: #1e293b;
            font-size: 13px;
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            color: #5b6778;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            transition: color 0.15s;
        }

        .footer-links a:hover {
            color: #2563eb;
        }

        .footer-bottom {
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
            padding-top: 16px;
            border-top: 1px solid #f1f5f9;
        }

        .footer-bottom .heart {
            color: #ef4444;
            margin: 0 4px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .navbar {
                padding: 16px 20px;
                flex-direction: column;
                gap: 12px;
            }
            
            .footer-content {
                flex-direction: column;
                text-align: center;
            }
            
            .footer-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 16px;
            }
            
            .forgot-wrapper {
                max-width: 90%;
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- ===== NAVBAR (COMPACT) ===== -->
    <div class="navbar">
        <div class="logo">
            <div class="logo-icon">HL</div>
            <div class="logo-text">HisaabLite</div>
        </div>
        <div class="nav-links">
            <a href="/" class="login"><i class="fas fa-home"></i> Home</a>
            <a href="/login" class="login"><i class="fas fa-sign-in-alt"></i> Login</a>
            <a href="/register" class="register"><i class="fas fa-rocket"></i> Start Free</a>
        </div>
    </div>

    <!-- ===== MAIN CONTENT (COMPACT) ===== -->
    <div class="main-content">
        <div class="forgot-wrapper">
            <div class="forgot-card">
                
                <div class="forgot-header">
                    <h2>
                        <i class="fas fa-key"></i>
                        Reset Password
                    </h2>
                    <p>Enter your email to receive reset link</p>
                </div>

                <!-- SUCCESS MESSAGE -->
                <div th:if="${message}" class="message success">
                    <i class="fas fa-check-circle"></i>
                    <p th:text="${message}"></p>
                </div>

                <!-- ERROR MESSAGE -->
                <div th:if="${error}" class="message error">
                    <i class="fas fa-exclamation-circle"></i>
                    <p th:text="${error}"></p>
                </div>

                <!-- FORGOT PASSWORD FORM -->
                <form method="post" th:action="@{/forgot-password}">
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" name="username" placeholder="Enter registered email" required />
                        </div>
                    </div>

                    <button type="submit" class="btn-reset">
                        <i class="fas fa-paper-plane"></i> Send Reset Link
                    </button>

                    <div class="back-link">
                        <a th:href="@{/login}">
                            <i class="fas fa-arrow-left"></i> Back to Login
                        </a>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <!-- ===== FOOTER (COMPACT) ===== -->
    <div class="footer">
        <div class="footer-content">
            <div class="footer-logo">
                <div class="logo-icon">HL</div>
                <span>HisaabLite</span>
            </div>
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Features</a>
                <a href="#">Pricing</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Support</a>
            </div>
        </div>
        <div class="footer-bottom">
            <i class="far fa-copyright"></i> 2026 HisaabLite • Built with <span class="heart">❤️</span> in India
        </div>
    </div>

</body>

</html>
