<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>500 • Server Error • Expygen</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/expygen-favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/main/fonts.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/pages/error-pages.css}">

</head>
<body class="error-body">
    <main class="error-shell">
        <section class="error-stage">
            <div class="error-illustration" aria-hidden="true">
                <div class="error-orbit"></div>
                <i class="fas fa-paper-plane error-plane"></i>
                <div class="error-dot dot-a"></div>
                <div class="error-dot dot-b"></div>
                <div class="error-dot dot-c"></div>
                <div class="error-dot dot-d"></div>
                <div class="error-shell-left"><span class="error-crack"></span></div>
                <div class="error-shell-right"><span class="error-crack"></span></div>
                <div class="error-center-mark">
                    <div class="error-burst"><span></span></div>
                    <div class="error-code-mark">500</div>
                </div>
                <div class="error-shadow"></div>
            </div>

            <div class="error-copy">
                <h1 class="error-title">Something broke on our side</h1>
                <p class="error-message" th:text="${message != null ? message : 'We hit an unexpected issue while loading this workspace. Please retry once or return to a safe page.'}">
                    We hit an unexpected issue while loading this workspace. Please retry once or return to a safe page.
                </p>
            </div>

            <div class="error-actions">
                <a href="javascript:window.location.reload();" class="error-btn error-btn-primary">
                    <i class="fas fa-rotate-right"></i>
                    <span>Try Again</span>
                </a>
                <a th:href="@{/dashboard}" class="error-btn error-btn-secondary">
                    <i class="fas fa-chart-pie"></i>
                    <span>Open Dashboard</span>
                </a>
            </div>

            <div class="error-meta">
                <span class="error-meta-pill"><i class="fas fa-shield-heart"></i> Your saved data is safe</span>
                <span class="error-meta-pill"><i class="fas fa-headset"></i> Contact support if this keeps happening</span>
            </div>
        </section>
    </main>
</body>
</html>
