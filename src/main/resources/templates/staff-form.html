<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Staff • HisaabLite</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f3f4f6;
            color: #1e293b;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 240px;
            background: #ffffff;
            border-right: 1px solid #e9eef2;
            padding: 32px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: none;
            height: 100vh;
            position: sticky;
            top: 0;
            flex-shrink: 0;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding-left: 4px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: #0f172a;
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .logo-text {
            font-weight: 600;
            font-size: 16px;
            letter-spacing: -0.2px;
            color: #0f172a;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .nav-links a {
            padding: 10px 14px;
            border-radius: 10px;
            text-decoration: none;
            color: #5b6778;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.15s;
        }

        .nav-links a i {
            width: 20px;
            font-size: 15px;
            color: #8893a4;
        }

        .nav-links a:hover {
            background: #f1f5f9;
            color: #0f172a;
        }

        .nav-links a:hover i {
            color: #0f172a;
        }

        .nav-links a.active {
            background: #f1f5f9;
            color: #0f172a;
            font-weight: 600;
        }

        .nav-links a.active i {
            color: #0f172a;
        }

        .logout-btn {
            width: 100%;
            padding: 10px 14px;
            background: #fef2f2;
            border: none;
            color: #b91c1c;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.15s;
            margin-top: 20px;
        }

        .logout-btn i {
            color: #b91c1c;
        }

        .logout-btn:hover {
            background: #fee2e2;
        }

        /* ===== MAIN CONTENT ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            height: 100vh;
            padding: 24px 32px 0 32px;
        }

        /* ===== PAGE HEADER ===== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .page-header h2 {
            font-size: 20px;
            font-weight: 600;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page-header h2 i {
            color: #2563eb;
        }

        /* ===== FORM CARD ===== */
        .form-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #edf2f7;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.02);
            padding: 32px;
            margin-bottom: 24px;
            max-width: 550px;
            width: 100%;
            align-self: center;
        }

        .form-title {
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f1f5f9;
        }

        .form-title i {
            color: #2563eb;
        }

        /* ===== FORM STYLES ===== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #5b6778;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .form-group label i {
            color: #94a3b8;
            font-size: 12px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 400;
            background: #fafbfc;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #2563eb;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
        }

        .form-group input::placeholder {
            color: #a0aec0;
            font-size: 13px;
        }

        /* ===== ERROR MESSAGE ===== */
        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #fee2e2;
        }

        .error-message i {
            font-size: 16px;
        }

        /* ===== ACTION BUTTONS ===== */
        .action-buttons {
            display: flex;
            gap: 16px;
            margin-top: 28px;
            align-items: center;
        }

        .btn-primary {
            background: #0f172a;
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.15s;
            box-shadow: 0 8px 16px rgba(15, 23, 42, 0.1);
            flex: 1;
        }

        .btn-primary:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.15);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #5b6778;
            padding: 14px 28px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.15s;
            text-decoration: none;
            flex: 1;
            text-align: center;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            color: #2563eb;
        }

        /* ===== FOOTER ===== */
        .footer {
            background: white;
            border-top: 1px solid #e9eef2;
            padding: 16px 24px;
            margin: 0 -32px 0 -32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #94a3b8;
            flex-shrink: 0;
            margin-top: auto;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .footer-left i {
            color: #2563eb;
            font-size: 14px;
        }

        .footer-left span {
            color: #475569;
        }

        .footer-left .heart {
            color: #ef4444;
            margin: 0 4px;
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .footer-right a {
            color: #64748b;
            text-decoration: none;
            transition: color 0.15s;
        }

        .footer-right a:hover {
            color: #2563eb;
        }

        .footer-right .version {
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .action-buttons {
                flex-direction: column;
            }

            .footer {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .footer-left,
            .footer-right {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">
        <div class="logo">
            <div class="logo-icon">HL</div>
            <div class="logo-text">HisaabLite</div>
        </div>

        <div class="nav-links">
            <a th:href="@{/dashboard}"><i class="fas fa-chart-pie"></i> Dashboard</a>

            <a th:if="${role == 'OWNER' or role == 'CASHIER'}" th:href="@{/sales/new}"><i
                    class="fas fa-cash-register"></i> Billing</a>

            <a th:if="${role == 'OWNER' or role == 'MANAGER'}" th:href="@{/products}"><i class="fas fa-box"></i>
                Products</a>

            <a th:href="@{/sales/history}"><i class="fas fa-clock"></i> Sales History</a>

            <a class="active" th:if="${role == 'OWNER'}" th:href="@{/staff}"><i class="fas fa-users"></i> Staff</a>

            <a th:if="${role == 'OWNER'}" th:href="@{/profile}"><i class="fas fa-store"></i> Profile</a>
        </div>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </form>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main">

        <!-- PAGE HEADER -->
        <div class="page-header">
            <h2><i class="fas fa-users"></i> Add Staff Member</h2>
        </div>

        <!-- FORM CARD -->
        <div class="form-card">

            <div class="form-title">
                <i class="fas fa-user-plus"></i> Staff Details
            </div>

            <!-- ERROR MESSAGE -->
            <div th:if="${error}" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <!-- STAFF FORM -->
            <form th:action="@{/staff}" method="post" th:object="${user}">

                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" th:field="*{name}" placeholder="Enter full name" required />
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" th:field="*{username}" placeholder="Enter email" required />
                </div>

                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone Number</label>
                    <input type="text" th:field="*{phone}" placeholder="Enter phone number" required />
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" th:field="*{password}" placeholder="Create password" required />
                </div>

                <div class="form-group">
                    <label><i class="fas fa-badge"></i> Role</label>
                    <select th:field="*{role}">
                        <option value="MANAGER">👔 Manager</option>
                        <option value="CASHIER">💰 Cashier</option>
                    </select>
                </div>

                <div class="action-buttons">
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> Save Staff
                    </button>
                    <a th:href="@{/staff}" class="btn-secondary">
                        <i class="fas fa-arrow-left"></i> Cancel
                    </a>
                </div>

            </form>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <div class="footer-left">
                <i class="fas fa-store"></i>
                <span>© 2026 HisaabLite</span>
                <span>·</span>
                <span>Made with <span class="heart">❤️</span> in India</span>
            </div>
            <div class="footer-right">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Support</a>
                <span class="version">v2.1.0</span>
                <span><i class="fas fa-circle" style="color: #10b981; font-size: 8px;"></i> All systems
                    operational</span>
            </div>
        </div>
    </div>

</body>

</html>
