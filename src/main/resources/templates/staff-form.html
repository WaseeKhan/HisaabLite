<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${user != null and user.id != null} ? 'Edit Staff • RxArogya' : 'Add Staff • RxArogya'">
        Add Staff • RxArogya
    </title>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/rxarogya-mark.svg}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <!-- Shop CSS -->
    <link rel="stylesheet" th:href="@{/css/main/shop-variables.css}">
    <link rel="stylesheet" th:href="@{/css/main/shop-reset.css}">
    <link rel="stylesheet" th:href="@{/css/main/shop-layout.css}">
    <link rel="stylesheet" th:href="@{/css/components/shop-sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/shop-header.css}">
    <link rel="stylesheet" th:href="@{/css/components/shop-footer.css}">
    <link rel="stylesheet" th:href="@{/css/pages/shop-staff-form.css}">
</head>

<body class="shop-body">

    <div class="shop-layout">
        <!-- Sidebar Fragment -->
        <div th:replace="~{fragments/shop-sidebar :: sidebar(shop=${shop}, role=${role}, currentPageName='staff')}"></div>

        <!-- Main Content -->
        <div class="shop-main">
            <div class="shop-content-wrapper">

                <!-- Header Fragment -->
                <div th:replace="~{fragments/shop-header :: header(shop=${shop}, user=${user}, role=${role}, planType=${planType})}"></div>

                <!-- Page Header - Centered -->
                <div class="page-header" style="text-align: center; justify-content: center;">
                    <!-- <h2>
                        <i class="fas fa-users"></i>
                        <span th:text="${user != null and user.id != null} ? 'Edit Staff Member' : 'Add Staff Member'">
                           
                        </span>
                    </h2> -->
                </div>

                <!-- Form Card - Centered -->
                <div style="display: flex; justify-content: center;">
                    <div class="form-card">

                        <div class="form-title">
                            <i class="fas" th:class="${user != null and user.id != null} ? 'fa-edit' : 'fa-user-plus'"></i>
                            <span th:text="${user != null and user.id != null} ? 'Edit Staff Details' : 'Add Staff Details'">
                                Staff Details
                            </span>
                        </div>

                        <!-- Error Message -->
                        <div th:if="${error}" class="error-message">
                            <i class="fas fa-exclamation-circle"></i>
                            <span th:text="${error}"></span>
                        </div>

                        <!-- Staff Form -->
                        <form th:action="@{/staff/save}" th:object="${user}" method="post">
                            <input type="hidden" th:field="*{id}" />

                            <div class="form-group">
                                <label><i class="fas fa-user"></i> Full Name <span style="color: #dc2626;">*</span></label>
                                <input type="text" th:field="*{name}" placeholder="Enter full name" required />
                            </div>

                            <div class="form-group">
                                <label><i class="fas fa-envelope"></i> Email Address <span style="color: #dc2626;">*</span></label>
                                <input type="email" th:field="*{username}" placeholder="Enter email" required />
                            </div>

                            <div class="form-group">
                                <label><i class="fas fa-phone"></i> Phone Number <span style="color: #dc2626;">*</span></label>
                                <input type="text" th:field="*{phone}" placeholder="Enter phone number" required />
                            </div>

                            <div class="form-group" th:if="${user == null or user.id == null}">
                                <label><i class="fas fa-lock"></i> Password <span style="color: #dc2626;">*</span></label>
                                <input type="password" th:field="*{password}" placeholder="Create password" required />
                            </div>

                            <div class="form-group" th:unless="${user == null or user.id == null}">
                                <label><i class="fas fa-key"></i> New Password</label>
                                <input type="password" th:field="*{password}" placeholder="Leave blank to keep current" />
                                <div class="hint-text">
                                    <i class="fas fa-info-circle"></i> Only fill if you want to change password
                                </div>
                            </div>

                            <div class="form-group">
                                <label><i class="fas fa-badge"></i> Role</label>
                                <select th:field="*{role}">
                                    <option value="MANAGER">👔 Manager - Full access</option>
                                    <option value="CASHIER">💰 Cashier - Billing only</option>
                                </select>
                                <div class="hint-text">
                                    <i class="fas fa-info-circle"></i> 
                                    <span th:text="${user != null and user.id != null} ? 'Changing role will update permissions' : 'Select appropriate role for staff member'">
                                        Select appropriate role for staff member
                                    </span>
                                </div>
                            </div>

                            <div class="action-buttons">
                                <button type="submit" class="btn-primary">
                                    <i class="fas fa-save"></i>
                                    <span th:text="${user != null and user.id != null} ? 'Update Staff' : 'Save Staff'">
                                        Save Staff
                                    </span>
                                </button>
                                <a th:href="@{/staff}" class="btn-secondary">
                                    <i class="fas fa-arrow-left"></i> Cancel
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>

            <!-- Footer Fragment -->
            <div th:replace="~{fragments/shop-footer :: footer}"></div>
        </div>
    </div>

    <!-- Reassign Confirmation Modal -->
    <div th:if="${showReassignModal}" class="reassign-modal">
        <div class="modal-container">
            <h3><i class="fas fa-exchange-alt"></i> Reassign Records</h3>
            <p>
                User <strong th:text="${userToDelete != null ? userToDelete.name : ''}"></strong> has existing 
                sales or ticket records. Please select a staff member to reassign these records to:
            </p>
            
            <form th:action="@{'/staff/' + ${userToDelete.id} + '/delete'}" method="post">
                <label>Reassign to:</label>
                <select name="reassignToId" required>
                    <option value="">-- Select Staff Member --</option>
                    <option th:each="staff : ${otherStaff}" 
                            th:value="${staff.id}" 
                            th:text="${staff.name} + ' (' + ${staff.role} + ')'"></option>
                </select>
                
                <div class="modal-actions">
                    <button type="submit" class="btn-danger">
                        <i class="fas fa-trash-alt"></i> Delete & Reassign
                    </button>
                    <a th:href="@{/staff}" class="btn-cancel">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Auto-focus on first input
        document.addEventListener('DOMContentLoaded', function() {
            const firstInput = document.querySelector('input[type="text"]');
            if (firstInput) {
                firstInput.focus();
            }
        });
        
        // Password strength indicator (optional)
        const passwordInput = document.querySelector('input[type="password"]');
        if (passwordInput) {
            passwordInput.addEventListener('input', function() {
                const value = this.value;
                const strength = getPasswordStrength(value);
                // You can add password strength UI here if needed
            });
        }
        
        function getPasswordStrength(password) {
            if (!password) return 0;
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            return strength;
        }
    </script>

</body>

</html>
