<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Products • HisaabLite</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">

    <!-- Fonts & Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Shop CSS -->
    <link rel="stylesheet" th:href="@{/css/main/shop-variables.css}">
    <link rel="stylesheet" th:href="@{/css/main/shop-reset.css}">
    <link rel="stylesheet" th:href="@{/css/main/shop-layout.css}">
    <link rel="stylesheet" th:href="@{/css/components/shop-sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/shop-header.css}">
    <link rel="stylesheet" th:href="@{/css/components/shop-footer.css}">
    <link rel="stylesheet" th:href="@{/css/pages/shop-products.css}">

    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>

<body class="shop-body">

    <div class="shop-layout">

        <!-- Sidebar Fragment -->
        <div th:replace="~{fragments/shop-sidebar :: sidebar}"></div>

        <!-- Main Content -->
        <div class="shop-main">
            <div class="shop-content-wrapper">

                <!-- Header -->
                <div th:replace="~{fragments/shop-header :: header}"></div>

                

                <!-- Stats Cards -->
                <div class="shop-stats-grid">
                    <div class="shop-stat-card">
                        <div class="shop-stat-info">
                            <h4>Total Products</h4>
                            <div class="shop-stat-number" id="totalProducts">0</div>
                        </div>
                        <div class="shop-stat-icon">
                            <i class="fas fa-box"></i>
                        </div>
                    </div>
                    <div class="shop-stat-card">
                        <div class="shop-stat-info">
                            <h4>Low Stock</h4>
                            <div class="shop-stat-number" id="lowStockCount">0</div>
                        </div>
                        <div class="shop-stat-icon">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                    </div>
                    <div class="shop-stat-card">
                        <div class="shop-stat-info">
                            <h4>Total Value</h4>
                            <div class="shop-stat-number" id="totalValue">₹0</div>
                        </div>
                        <div class="shop-stat-icon">
                            <i class="fas fa-rupee-sign"></i>
                        </div>
                    </div>
                    <div class="shop-stat-card">
                        <div class="shop-stat-info">
                            <h4>Categories</h4>
                            <div class="shop-stat-number" id="categoryCount">0</div>
                        </div>
                        <div class="shop-stat-icon">
                            <i class="fas fa-tags"></i>
                        </div>
                    </div>
                </div>

                <!-- Filter Bar with Action Buttons -->
                <div class="shop-filter-actions">
                    <div class="shop-filter-bar">
                        <span class="shop-filter-chip active" data-filter="all">All Products</span>
                        <span class="shop-filter-chip" data-filter="low-stock">Low Stock</span>
                        <span class="shop-filter-chip" data-filter="in-stock">In Stock</span>
                    </div>
                    <div class="shop-actions-right">
                        <div class="shop-search">
                        <i class="fas fa-search shop-search-icon"></i>
                        <input type="text" id="searchInput" class="shop-search-input"
                            placeholder="Search products..." autocomplete="off">
                        <i class="fas fa-spinner fa-pulse shop-search-loading" id="searchLoading"></i>
                    </div>
                        <button onclick="exportProducts()" class="shop-btn-icon">
                            <i class="fas fa-download"></i> Export
                        </button>
                        <button onclick="window.print()" class="shop-btn-icon">
                            <i class="fas fa-print"></i> Print
                        </button>
                        <a th:href="@{/products/new}" class="shop-btn-primary">
                            <i class="fas fa-plus"></i> Add Product
                        </a>
                    </div>
                </div>

                <!-- Products Table -->
                <div class="shop-products-card">
                    <div class="shop-table-responsive">
                        <table class="shop-table" id="productsTable">
                            <thead>
                                <tr>
                                    <th style="width: 30px;">
                                        <input type="checkbox" id="selectAllCheckbox">
                                    </th>
                                    <th>Product</th>
                                    <th>Price</th>
                                    <th>GST</th>
                                    <th>Stock</th>
                                    <th>Actions</th>
                                 </thead>
                            <tbody id="productsTableBody">
                                <tr>
                                    <td colspan="6" class="shop-empty-state">
                                        <i class="fas fa-spinner fa-pulse"></i>
                                        <p>Loading products...</p>
                                     </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Bulk Actions -->
                    <div id="bulkActions" class="shop-bulk-actions">
                        <span id="selectedCount">0</span> products selected
                        <button class="shop-btn-delete" onclick="bulkDelete()">
                            <i class="fas fa-trash"></i> Delete Selected
                        </button>
                        <button onclick="clearSelection()" class="shop-cancel-btn">Cancel</button>
                    </div>

                    <!-- Pagination -->
                    <div id="paginationContainer"></div>
                    <div id="paginationInfo" class="shop-pagination-info"></div>
                </div>
            </div>

            <!-- Footer -->
            <div th:replace="~{fragments/shop-footer :: footer}"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Your existing JavaScript (keep the same working code)
        let currentPage = 0;
        let currentKeyword = '';
        let currentFilter = 'all';
        let selectedProducts = new Set();
        let allProductsData = [];

        $(document).ready(function () {
            loadProducts();

            let searchTimeout;
            $('#searchInput').on('input', function () {
                clearTimeout(searchTimeout);
                currentKeyword = $(this).val();
                currentPage = 0;
                selectedProducts.clear();
                updateBulkActions();
                $('#searchLoading').show();
                searchTimeout = setTimeout(function () { loadProducts(); }, 400);
            });

            $('.shop-filter-chip').click(function () {
                $('.shop-filter-chip').removeClass('active');
                $(this).addClass('active');
                currentFilter = $(this).data('filter');
                currentPage = 0;
                selectedProducts.clear();
                updateBulkActions();
                loadProducts();
            });

            $('#selectAllCheckbox').change(function () {
                if ($(this).is(':checked')) {
                    allProductsData.forEach(product => { selectedProducts.add(product.id); });
                } else {
                    selectedProducts.clear();
                }
                renderProducts({ products: allProductsData, totalItems: allProductsData.length });
                updateBulkActions();
            });
        });

        function loadProducts() {
            $.ajax({
                url: '/products/search-live',
                method: 'GET',
                data: { keyword: currentKeyword, page: currentPage },
                success: function (response) {
                    allProductsData = response.products;
                    let filteredProducts = filterProducts(allProductsData);
                    let filteredResponse = { ...response, products: filteredProducts, totalItems: filteredProducts.length };
                    renderProducts(filteredResponse);
                    renderPagination(filteredResponse);
                    updateStats(filteredProducts);
                    $('#searchLoading').hide();
                },
                error: function () {
                    $('#searchLoading').hide();
                    showError('Failed to load products');
                }
            });
        }

        function filterProducts(products) {
            if (currentFilter === 'low-stock') return products.filter(p => p.stockQuantity <= p.minStock);
            if (currentFilter === 'in-stock') return products.filter(p => p.stockQuantity > p.minStock);
            return products;
        }

        function updateStats(products) {
            const totalProducts = products.length;
            const lowStockCount = products.filter(p => p.stockQuantity <= p.minStock).length;
            const totalValue = products.reduce((sum, p) => sum + (p.price * p.stockQuantity), 0);
            const categories = new Set(products.map(p => p.category || 'Uncategorized')).size;
            $('#totalProducts').text(totalProducts);
            $('#lowStockCount').text(lowStockCount);
            $('#totalValue').text('₹' + totalValue.toLocaleString('en-IN'));
            $('#categoryCount').text(categories);
        }

        function renderProducts(data) {
            const tbody = $('#productsTableBody');
            tbody.empty();

            if (!data.products || data.products.length === 0) {
                tbody.html(`
                    <tr>
                        <td colspan="6" class="shop-empty-state">
                            <i class="fas fa-box-open"></i>
                            <p>${currentKeyword ? 'No products found matching "' + escapeHtml(currentKeyword) + '"' : 'No products yet'}</p>
                            ${!currentKeyword ? '<a href="/products/new" class="shop-add-link">Add Product</a>' : ''}
                        </td>
                    </tr>
                `);
                return;
            }

            data.products.forEach(function (product) {
                const isLowStock = product.stockQuantity <= product.minStock;
                const stockBadge = isLowStock ?
                    '<span class="shop-low-stock-badge"><i class="fas fa-exclamation-circle"></i> Low Stock</span>' :
                    '<span class="shop-in-stock-badge"><i class="fas fa-check-circle"></i> In Stock</span>';
                const isChecked = selectedProducts.has(product.id);
                const gstPercent = product.gstPercent || 0;

                let gstBadgeClass = 'shop-gst-badge';
                if (gstPercent === 0) {
                    gstBadgeClass = 'shop-gst-badge shop-gst-badge-zero';
                }

                const row = `
                    <tr>
                        <td style="text-align: center;">
                            <input type="checkbox" class="product-checkbox" data-id="${product.id}" ${isChecked ? 'checked' : ''}>
                        </td>
                        <td>
                            <div class="shop-product-name">${escapeHtml(product.name)}</div>
                            ${product.description ? '<div class="shop-product-description">' + escapeHtml(product.description.substring(0, 60)) + '</div>' : ''}
                        </td>
                        <td><span class="shop-price">₹${formatPrice(product.price)}</span></td>
                        <td><span class="${gstBadgeClass}">${gstPercent}%</span></td>
                        <td>
                            <div class="shop-stock-cell">
                                <span class="shop-stock-quantity">${product.stockQuantity}</span>
                                ${stockBadge}
                            </div>
                        </td>
                        <td>
                            <div class="shop-action-buttons-group">
                                <a href="/products/edit/${product.id}" class="shop-btn-edit">
                                    <i class="fas fa-edit"></i> Edit
                                </a>
                                <button onclick="duplicateProduct(${product.id})" class="shop-btn-duplicate">
                                    <i class="fas fa-copy"></i>
                                </button>
                                <form action="/products/delete/${product.id}" method="post" style="display:inline;">
                                    <input type="hidden" name="_csrf" value="${getCsrfToken()}">
                                    <button type="submit" class="shop-btn-delete" onclick="return confirm('Delete ${escapeHtml(product.name)}?')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                `;
                tbody.append(row);
            });

            $('.product-checkbox').change(function () {
                const productId = parseInt($(this).data('id'));
                if ($(this).is(':checked')) {
                    selectedProducts.add(productId);
                } else {
                    selectedProducts.delete(productId);
                }
                updateBulkActions();
                $('#selectAllCheckbox').prop('checked', selectedProducts.size === data.products.length && data.products.length > 0);
            });
        }

        function updateBulkActions() {
            const count = selectedProducts.size;
            if (count > 0) {
                $('#bulkActions').addClass('show');
                $('#selectedCount').text(count);
            } else {
                $('#bulkActions').removeClass('show');
            }
        }

        function clearSelection() {
            selectedProducts.clear();
            updateBulkActions();
            $('#selectAllCheckbox').prop('checked', false);
            loadProducts();
        }

        function bulkDelete() {
            if (selectedProducts.size === 0) return;
            if (confirm(`Delete ${selectedProducts.size} selected product(s)?`)) {
                const csrfToken = getCsrfToken();
                const ids = Array.from(selectedProducts);
                $.ajax({
                    url: '/products/bulk-delete',
                    method: 'POST',
                    contentType: 'application/json',
                    headers: { 'X-CSRF-TOKEN': csrfToken },
                    data: JSON.stringify(ids),
                    success: function (response) {
                        showSuccess(response.message);
                        selectedProducts.clear();
                        updateBulkActions();
                        loadProducts();
                    },
                    error: function () { showError('Failed to delete products'); }
                });
            }
        }

        function duplicateProduct(id) {
            $.ajax({
                url: '/products/duplicate',
                method: 'POST',
                headers: { 'X-CSRF-TOKEN': getCsrfToken() },
                data: { id: id, _csrf: getCsrfToken() },
                success: function () {
                    showSuccess('Product duplicated successfully');
                    loadProducts();
                },
                error: function () { showError('Failed to duplicate product'); }
            });
        }

        function exportProducts() {
            window.location.href = '/products/export';
            showSuccess('Exporting products...');
        }

        function renderPagination(data) {
            const container = $('#paginationContainer');
            container.empty();

            if (data.totalPages <= 1) return;

            let paginationHtml = '<div class="shop-pagination">';
            paginationHtml += `<button onclick="changePage(${data.currentPage - 1})" ${!data.hasPrevious ? 'disabled' : ''}>
                <i class="fas fa-chevron-left"></i>
            </button>`;

            const startPage = Math.max(0, data.currentPage - 2);
            const endPage = Math.min(data.totalPages - 1, data.currentPage + 2);

            if (startPage > 0) {
                paginationHtml += `<button onclick="changePage(0)">1</button>`;
                if (startPage > 1) paginationHtml += `<button disabled>...</button>`;
            }

            for (let i = startPage; i <= endPage; i++) {
                const activeClass = i === data.currentPage ? 'active' : '';
                paginationHtml += `<button class="${activeClass}" onclick="changePage(${i})">${i + 1}</button>`;
            }

            if (endPage < data.totalPages - 1) {
                if (endPage < data.totalPages - 2) paginationHtml += `<button disabled>...</button>`;
                paginationHtml += `<button onclick="changePage(${data.totalPages - 1})">${data.totalPages}</button>`;
            }

            paginationHtml += `<button onclick="changePage(${data.currentPage + 1})" ${!data.hasNext ? 'disabled' : ''}>
                <i class="fas fa-chevron-right"></i>
            </button>`;
            paginationHtml += '</div>';
            container.html(paginationHtml);

            const startItem = data.currentPage * data.pageSize + 1;
            const endItem = Math.min((data.currentPage + 1) * data.pageSize, data.totalItems);
            $('#paginationInfo').html(`
                Showing ${startItem} to ${endItem} of ${data.totalItems} products
                ${currentKeyword ? ' · Searching: "' + escapeHtml(currentKeyword) + '"' : ''}
                ${currentFilter !== 'all' ? ' · Filter: ' + currentFilter.replace('-', ' ') : ''}
            `);
        }

        function changePage(page) {
            if (page === currentPage) return;
            currentPage = page;
            selectedProducts.clear();
            updateBulkActions();
            loadProducts();
            document.querySelector('.shop-main').scrollTop = 0;
        }

        function formatPrice(price) {
            return parseFloat(price).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, function (m) { return map[m]; });
        }

        function getCsrfToken() {
            return $('meta[name="_csrf"]').attr('content');
        }

        function showError(message) {
            const errorDiv = $('<div>', { class: 'shop-toast-error', text: message }).appendTo('body');
            setTimeout(() => errorDiv.fadeOut(300, function () { $(this).remove(); }), 3000);
        }

        function showSuccess(message) {
            const successDiv = $('<div>', { class: 'shop-toast-success', text: '✓ ' + message }).appendTo('body');
            setTimeout(() => successDiv.fadeOut(300, function () { $(this).remove(); }), 3000);
        }
    </script>
</body>

</html>
