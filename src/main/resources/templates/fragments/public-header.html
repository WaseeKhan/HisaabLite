<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<header th:fragment="header" class="site-header">
    <div class="header-container">

        <a th:href="@{/}" class="header-logo">
            <span class="logo-img-wrap">
                <img th:src="@{/images/expygen-mark-light.svg}" th:alt="${@appConfig.appName}"
                     class="header-logo-img logo-dark">
                <img th:src="@{/images/expygen-mark-dark.svg}" th:alt="${@appConfig.appName}"
                     class="header-logo-img logo-light">
            </span>

            <span class="logo-text">
                <span class="logo-name">ÉXPYGEN</span>
                <span class="logo-tagline">Simplified Pharmacy</span>
            </span>
        </a>

        <button class="menu-toggle" id="menuToggle" type="button" aria-label="Open menu">
            <span></span><span></span><span></span>
        </button>

        <nav class="header-nav" id="mobileMenu">

            <div class="nav-dropdown">
                <button type="button" class="nav-link nav-drop-btn">
                    Product <i class="fas fa-chevron-down"></i>
                </button>
                <div class="dropdown-menu">
                    <a th:href="@{/features}">Features</a>
                    <a th:href="@{/workflow}">Workflow</a>
                    <a th:href="@{/pricing}">Pricing</a>
                </div>
            </div>

            <div class="nav-dropdown">
                <button type="button" class="nav-link nav-drop-btn">
                    Solutions <i class="fas fa-chevron-down"></i>
                </button>
                <div class="dropdown-menu">
                    <a href="#">Medical Stores</a>
                    <a href="#">Retail Shops</a>
                    <a href="#">Multi-user Stores</a>
                </div>
            </div>

            <a th:href="@{/pricing}" class="nav-link nav-direct">Pricing</a>

            <div class="nav-dropdown">
                <button type="button" class="nav-link nav-drop-btn">
                    Resources <i class="fas fa-chevron-down"></i>
                </button>
                <div class="dropdown-menu">
                    <a th:href="@{/blog}">Blog</a>
                    <a th:href="@{'/help'}">Help Center</a>
                    <a th:href="@{/help}">Support</a>
                </div>
            </div>

            <div class="nav-dropdown">
                <button type="button" class="nav-link nav-drop-btn">
                    Company <i class="fas fa-chevron-down"></i>
                </button>
                <div class="dropdown-menu dropdown-menu-right">
                    <a th:href="@{/about}">About</a>
                    <a th:href="@{/careers}">Careers</a>
                    <a th:href="@{/contact}">Contact</a>
                </div>
            </div>

        </nav>

        <div class="header-actions">
            <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle theme">
                <i class="fas fa-moon"></i>
            </button>

            <a th:href="@{/login}" class="header-login">Login</a>

            <a th:href="@{/register}" class="header-cta">
                Start Free <i class="fas fa-arrow-right"></i>
            </a>
        </div>

    </div>
</header>

</html>
