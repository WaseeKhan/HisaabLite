<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Public Header - Relevant Pages for Billing SaaS -->
<header th:fragment="public-header" class="hl-public-header">
    <div class="hl-header-container">
        <!-- Logo -->
        <a href="/" class="hl-logo">
            <div class="hl-logo-icon">HL</div>
            <span class="hl-logo-text">HisaabLite</span>
        </a>
        
        <!-- Navigation - Relevant Pages -->
        <nav class="hl-nav">
            <a href="/features" class="hl-nav-link">
                <i class="fas fa-star"></i> Features
            </a>
            <a href="/how-it-works" class="hl-nav-link">
                <i class="fas fa-play-circle"></i> How It Works
            </a>
            <a href="/pricing" class="hl-nav-link">
                <i class="fas fa-tag"></i> Pricing
            </a>
            <a href="/blog" class="hl-nav-link">
                <i class="fas fa-newspaper"></i> Blog
            </a>
            <a href="/help" class="hl-nav-link">
                <i class="fas fa-headset"></i> Help
            </a>
        </nav>
        
        <!-- Actions -->
        <div class="hl-actions">
            <a href="/login" class="hl-btn-login">Login</a>
            <a href="/register" class="hl-btn-register">Start Free</a>
        </div>
        
        <!-- Mobile Toggle -->
        <button class="hl-mobile-toggle" id="hlMenuToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
    
    <!-- Mobile Menu -->
    <div class="hl-mobile-menu" id="hlMobileMenu">
        <div class="hl-mobile-inner">
            <a href="/features" class="hl-mobile-link">
                <i class="fas fa-star"></i> Features
            </a>
            <a href="/how-it-works" class="hl-mobile-link">
                <i class="fas fa-play-circle"></i> How It Works
            </a>
            <a href="/pricing" class="hl-mobile-link">
                <i class="fas fa-tag"></i> Pricing
            </a>
            <a href="/blog" class="hl-mobile-link">
                <i class="fas fa-newspaper"></i> Blog
            </a>
            <a href="/help" class="hl-mobile-link">
                <i class="fas fa-headset"></i> Help
            </a>
            <div class="hl-mobile-actions">
                <a href="/login" class="hl-mobile-login">Login</a>
                <a href="/register" class="hl-mobile-register">Start Free</a>
            </div>
        </div>
    </div>
</header>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const toggle = document.getElementById('hlMenuToggle');
    const menu = document.getElementById('hlMobileMenu');
    
    if (toggle && menu) {
        toggle.addEventListener('click', function() {
            toggle.classList.toggle('hl-active');
            menu.classList.toggle('hl-active');
            document.body.style.overflow = menu.classList.contains('hl-active') ? 'hidden' : '';
        });
        
        document.addEventListener('click', function(e) {
            if (menu.classList.contains('hl-active') && 
                !toggle.contains(e.target) && 
                !menu.contains(e.target)) {
                toggle.classList.remove('hl-active');
                menu.classList.remove('hl-active');
                document.body.style.overflow = '';
            }
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && menu.classList.contains('hl-active')) {
                toggle.classList.remove('hl-active');
                menu.classList.remove('hl-active');
                document.body.style.overflow = '';
            }
        });
    }
});
</script>
