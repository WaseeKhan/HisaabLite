<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="header" class="topbar">
    <div class="topbar-left">
        <button type="button" class="shop-nav-toggle" id="shopNavToggle" aria-label="Toggle navigation" aria-controls="shopSidebarNav" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <a th:href="@{/dashboard}" class="app-brand-line" aria-label="Open dashboard">
            <img th:src="@{/images/expygen-logo-light.png}" th:alt="${@appConfig.appName}" class="app-brand-image app-brand-image-dark">
            <img th:src="@{/images/expygen-logo-dark.png}" th:alt="${@appConfig.appName}" class="app-brand-image app-brand-image-light">
        </a>

        <span class="topbar-divider-line"></span>

        <strong class="shop-title-inline" th:text="${shop != null and shop.name != null ? shop.name : 'NA'}">Shop Name</strong>

        <div class="shop-info">
            <div class="info-tag"><i class="fas fa-percent"></i> <span th:text="${shop?.gstNumber != null ? shop.gstNumber : 'N/A'}">GST123</span></div>
            <div class="info-tag"><i class="fas fa-calendar-alt"></i> <span th:text="${#temporals.format(shop.createdAt, 'MMM yyyy')}">Jan 2024</span></div>
        </div>
    </div>

    <div class="user-info">
        <button type="button" class="shop-theme-toggle" data-theme-toggle onclick="window.toggleAppTheme && window.toggleAppTheme()" aria-label="Toggle dark mode" title="Toggle dark mode">
            <i class="fas fa-moon" data-theme-icon></i>
            <span data-theme-label data-theme-label-mode="compact">Dark</span>
        </button>
        <div class="role-badge" th:classappend="${role == 'OWNER' ? 'role-owner' : (role == 'MANAGER' ? 'role-manager' : 'role-cashier')}">
            <i class="fas fa-circle"></i>
            <span th:text="${role}">OWNER</span>
        </div>
        <span class="divider"></span>
        <span class="shop-id" th:text="'RX' + ${shop.id}">RX</span>
        <span class="divider"></span>
        <div class="plan-wrapper">
            <a th:href="@{/subscription}" class="plan-badge" th:classappend="${planType == 'FREE' ? 'plan-free' : (planType == 'BASIC' ? 'plan-basic' : (planType == 'PREMIUM' ? 'plan-premium' : 'plan-enterprise'))}">
                <i th:if="${planType == 'FREE'}" class="fas fa-star"></i>
                <i th:if="${planType == 'BASIC'}" class="fas fa-gem"></i>
                <i th:if="${planType == 'PREMIUM'}" class="fas fa-crown"></i>
                <i th:if="${planType == 'ENTERPRISE'}" class="fas fa-building"></i>
                <span th:text="${planType}">FREE</span>
            </a>
        </div>
        <span class="divider"></span>
        <div class="insights-user-menu-wrap shop-user-menu-wrap">
            <button type="button" class="insights-user-trigger shop-user-trigger" id="shopUserTrigger" aria-haspopup="true" aria-expanded="false">
                <span class="insights-user-avatar shop-user-avatar" th:text="${user != null ? #strings.substring(user.name, 0, 1) : 'U'}">U</span>
                <span class="insights-user-name shop-user-name" th:text="${user != null ? user.name : 'User'}">User</span>
                <i class="fas fa-chevron-down"></i>
            </button>
            <div id="userMenu" class="insights-user-menu shop-user-menu">
                <div class="insights-user-menu-meta">
                    <strong th:text="${user != null ? user.name : 'User'}">User</strong>
                    <span th:text="${user != null ? user.username : 'user@example.com'}">user@example.com</span>
                </div>
                <div class="insights-user-menu-divider"></div>
                <a th:href="@{/dashboard}"><i class="fas fa-home"></i><span>Main Dashboard</span></a>
                <a th:href="@{/user-profile}" class="shop-user-profile-link"><i class="fas fa-user"></i><span>User Profile</span></a>
                <a th:href="@{/forgot-password}"><i class="fas fa-key"></i><span>Change Password</span></a>
                <div class="insights-user-menu-divider"></div>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('click', function(event) {
            var dropdown = document.getElementById('shopUserTrigger');
            var menu = document.getElementById('userMenu');
            if (dropdown && menu) {
                if (!dropdown.contains(event.target) && !menu.contains(event.target)) {
                    menu.classList.remove('show');
                    dropdown.classList.remove('open');
                    dropdown.setAttribute('aria-expanded', 'false');
                }
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            var userTrigger = document.getElementById('shopUserTrigger');
            var userMenu = document.getElementById('userMenu');
            var navToggle = document.getElementById('shopNavToggle');

            if (userTrigger && userMenu) {
                userTrigger.addEventListener('click', function (event) {
                    event.stopPropagation();
                    userMenu.classList.toggle('show');
                    userTrigger.classList.toggle('open');
                    userTrigger.setAttribute('aria-expanded', userMenu.classList.contains('show') ? 'true' : 'false');
                });
            }

            if (!navToggle) return;

            var syncExpanded = function() {
                navToggle.setAttribute('aria-expanded', document.body.classList.contains('shop-shell-nav-open') ? 'true' : 'false');
            };

            navToggle.addEventListener('click', function() {
                document.body.classList.toggle('shop-shell-nav-open');
                syncExpanded();
            });

            window.addEventListener('resize', function() {
                if (window.innerWidth > 960 && document.body.classList.contains('shop-shell-nav-open')) {
                    document.body.classList.remove('shop-shell-nav-open');
                    syncExpanded();
                }
            });

            syncExpanded();
        });
    </script>
    <script th:src="@{/js/theme-toggle.js}"></script>
</div>
</html>
