<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Footer Fragment - COMPACT -->
<footer th:fragment="footer" class="site-footer">
    <div class="footer-container">
        <div class="footer-brand-block">
            <a href="/" class="footer-logo">
                <img th:src="@{/images/expygen-mark-light.svg}" th:alt="${@appConfig.appName}" class="footer-logo-image footer-logo-image-dark">
                <img th:src="@{/images/expygen-mark-dark.svg}" th:alt="${@appConfig.appName}" class="footer-logo-image footer-logo-image-light">
            </a>
        </div>

        <div class="footer-links-cluster">
            <div class="footer-links">
                <a href="/about">About</a>
                <a href="/pricing">Pricing</a>
                <a href="/blog">Insights</a>
                <a href="/help">Support</a>
                <a href="/contact">Contact</a>
                <a href="/careers">
                    Careers
                    <span class="career-badge">HIRING</span>
                </a>
            </div>
            <div class="footer-socials">
                <a href="#" class="social-link" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="#" class="social-link" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                <a href="#" class="social-link" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-link" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            </div>
        </div>

        <div class="footer-meta">
            <div class="footer-meta-links">
                <span th:text="'© 2026 ' + ${@appConfig.appName}">© 2026 RxArogya</span>
                <span class="separator">•</span>
                <a href="/privacy">Privacy</a>
                <span class="separator">•</span>
                <a href="/terms">Terms</a>
                <span class="separator">•</span>
                <span class="footer-made">Made with <span class="heart">♥</span> in India</span>
            </div>
            <span class="version" th:text="'v' + ${@appConfig.appVersion}">v2.1.2</span>
        </div>
    </div>
</footer>
