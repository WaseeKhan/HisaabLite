<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<footer th:fragment="footer" class="site-footer">
    <div class="footer-container">

        <div class="footer-brand-block">

            <a th:href="@{/}" class="footer-logo">
                <span class="footer-logo-lockup-wrap">
                    <img th:src="@{/images/branding/expygen-logo-light-bg.svg}" th:alt="${@appConfig.appName}"
                         class="footer-logo-image footer-logo-image-dark">

                    <img th:src="@{/images/branding/expygen-logo-dark-bg.svg}" th:alt="${@appConfig.appName}"
                         class="footer-logo-image footer-logo-image-light">
                </span>
            </a>

            <p class="footer-desc">
                Modern billing, inventory, WhatsApp invoices and insights
                for Indian medical stores.
            </p>



            <div class="footer-social">
                
                <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            </div>
        </div>

        <div class="footer-links-cluster">
            <div class="footer-links-title">Product</div>
            <div class="footer-links">
                <a th:href="@{/features}">Features</a>
                <a th:href="@{/workflow}">Workflow</a>
                <a th:href="@{/pricing}">Pricing</a>
                <a th:href="@{/login}">Login</a>
                <a th:href="@{/register}">Start Free</a>
            </div>
        </div>

        <div class="footer-links-cluster">
            <div class="footer-links-title">Company</div>
            <div class="footer-links">
                <a th:href="@{/about}">About</a>
                <a th:href="@{/contact}">Contact</a>
                <a th:href="@{/careers}">Careers</a>
                <a th:href="@{/help}">Support</a>
                <a th:href="@{/blog}">Blog</a>
            </div>
        </div>

        <div class="footer-links-cluster">
            <div class="footer-links-title">Legal</div>
            <div class="footer-links">
                <a th:href="@{/privacy}">Privacy</a>
                <a th:href="@{/terms}">Terms</a>
            </div>
        </div>

    </div>

    <div class="footer-bottom">
        <span th:text="'© 2026 ' + ${@appConfig.appName}">© 2026 Expygen</span>
        <span>Made with <span class="heart">♥</span> in India</span>
    </div>
</footer>

</html>
