<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Sales History • HisaabLite</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Shop CSS -->
    <link rel="stylesheet" th:href="@{/css/main/shop-variables.css}">
    <link rel="stylesheet" th:href="@{/css/main/shop-reset.css}">
    <link rel="stylesheet" th:href="@{/css/main/shop-layout.css}">
    <link rel="stylesheet" th:href="@{/css/components/shop-sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/shop-header.css}">
    <link rel="stylesheet" th:href="@{/css/components/shop-footer.css}">
    <link rel="stylesheet" th:href="@{/css/pages/shop-sales-history.css}">

    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>

<body class="shop-body">

    <div class="shop-layout">

        <!-- Sidebar Fragment -->
        <div th:replace="~{fragments/shop-sidebar :: sidebar}"></div>

        <!-- Main Content -->
        <div class="shop-main">
            <div class="shop-content-wrapper">

                <!-- Header Fragment -->
                <div th:replace="~{fragments/shop-header :: header}"></div>

               

                <!-- Stats Cards -->
                <div class="sales-stats-grid">
                    <div class="sales-stat-card">
                        <div class="sales-stat-info">
                            <h4>Total Sales</h4>
                            <div class="sales-stat-number" id="totalSales">0</div>
                        </div>
                        <div class="sales-stat-icon">
                            <i class="fas fa-chart-line"></i>
                        </div>
                    </div>
                    <div class="sales-stat-card">
                        <div class="sales-stat-info">
                            <h4>Revenue</h4>
                            <div class="sales-stat-number" id="totalRevenue">₹0</div>
                        </div>
                        <div class="sales-stat-icon">
                            <i class="fas fa-rupee-sign"></i>
                        </div>
                    </div>
                    <div class="sales-stat-card">
                        <div class="sales-stat-info">
                            <h4>Completed</h4>
                            <div class="sales-stat-number" id="completedCount">0</div>
                        </div>
                        <div class="sales-stat-icon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    </div>
                    <div class="sales-stat-card">
                        <div class="sales-stat-info">
                            <h4>Cancelled</h4>
                            <div class="sales-stat-number" id="cancelledCount">0</div>
                        </div>
                        <div class="sales-stat-icon">
                            <i class="fas fa-times-circle"></i>
                        </div>
                    </div>
                </div>

                <!-- Search & Filter Bar -->
                <div class="sales-search-filter">
                    <div class="sales-search-wrapper">
                        <i class="fas fa-search sales-search-icon"></i>
                        <input type="text" id="searchInput" class="sales-search-input" 
                               placeholder="Search by invoice, customer..." autocomplete="off">
                        <i class="fas fa-spinner fa-pulse sales-search-loading" id="searchLoading"></i>
                    </div>
                    
                    <div class="sales-filters">
                        <select id="statusFilter" class="sales-filter-select">
                            <option value="">All Status</option>
                            <option value="COMPLETED">Completed</option>
                            <option value="CANCELLED">Cancelled</option>
                        </select>
                        
                        <select id="dateRangeFilter" class="sales-filter-select">
                            <option value="">All Time</option>
                            <option value="today">Today</option>
                            <option value="week">Last 7 Days</option>
                            <option value="month">Last 30 Days</option>
                        </select>
                        
                        <select id="sortFilter" class="sales-filter-select">
                            <option value="saleDate_desc">Latest</option>
                            <option value="totalAmount_desc">Highest</option>
                            <option value="totalAmount_asc">Lowest</option>
                        </select>
                        
                        <button id="clearFilters" class="sales-clear-filters">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>

                <!-- Sales Card -->
                <div class="sales-card">
                    <div class="sales-table-responsive">
                        <table class="sales-table">
                            <thead>
                                <tr>
                                    <th style="width: 80px;">Invoice</th>
                                    <th style="width: 220px;">Date & Time</th>
                                    <th style="width: 200px;">Customer</th>
                                    <th style="width: 100px;">Cashier</th>
                                    <th style="width: 100px;">Amount</th>
                                    <th style="width: 100px;">Status</th>
                                    <th style="width: 100px;">Actions</th>
                                 </thead>
                            <tbody id="salesTableBody">
                                 <tr>
                                    <td colspan="6" class="sales-empty-state">
                                        <i class="fas fa-spinner fa-pulse"></i>
                                        <p>Loading sales...</p>
                                     </tr>
                            </tbody>
                          </table>
                    </div>

                    <!-- Pagination -->
                    <div id="paginationContainer" class="sales-pagination"></div>
                    <div id="paginationInfo" class="sales-pagination-info"></div>
                </div>

            </div>

            <!-- Footer Fragment -->
            <div th:replace="~{fragments/shop-footer :: footer}"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script th:inline="javascript">
        let currentPage = 0;
        let currentKeyword = '';
        let currentStatus = '';
        let currentDateRange = '';
        let currentSort = 'saleDate_desc';
        let searchTimeout;

        // Get initial server data
        const totalSales = /*[[${totalSales}]]*/ 0;
        const totalRevenue = /*[[${totalRevenue}]]*/ 0;
        const completedCount = /*[[${completedCount}]]*/ 0;
        const cancelledCount = /*[[${cancelledCount}]]*/ 0;

        $(document).ready(function() {
            // Update stats cards
            $('#totalSales').text(totalSales);
            $('#totalRevenue').text('₹' + formatNumber(totalRevenue));
            $('#completedCount').text(completedCount);
            $('#cancelledCount').text(cancelledCount);
            
            // Load initial sales
            loadSales();
            
            // Live search with debounce
            $('#searchInput').on('input', function() {
                clearTimeout(searchTimeout);
                currentKeyword = $(this).val();
                currentPage = 0;
                $('#searchLoading').show();
                searchTimeout = setTimeout(function() { 
                    loadSales(); 
                }, 400);
            });
            
            // Filter changes
            $('#statusFilter').change(function() {
                currentStatus = $(this).val();
                currentPage = 0;
                loadSales();
            });
            
            $('#dateRangeFilter').change(function() {
                currentDateRange = $(this).val();
                currentPage = 0;
                loadSales();
            });
            
            $('#sortFilter').change(function() {
                currentSort = $(this).val();
                currentPage = 0;
                loadSales();
            });
            
            $('#clearFilters').click(function() {
                $('#searchInput').val('');
                $('#statusFilter').val('');
                $('#dateRangeFilter').val('');
                $('#sortFilter').val('saleDate_desc');
                currentKeyword = '';
                currentStatus = '';
                currentDateRange = '';
                currentSort = 'saleDate_desc';
                currentPage = 0;
                loadSales();
            });
        });
        
        function loadSales() {
            const [sortBy, sortDir] = currentSort.split('_');
            
            $.ajax({
                url: '/sales/history/search',
                method: 'GET',
                data: {
                    keyword: currentKeyword,
                    status: currentStatus,
                    dateRange: currentDateRange,
                    page: currentPage,
                    sortBy: sortBy,
                    sortDir: sortDir || 'desc'
                },
                success: function(response) {
                    renderSales(response.sales);
                    renderPagination(response);
                    $('#searchLoading').hide();
                },
                error: function(xhr, status, error) {
                    console.error('Error:', error);
                    $('#searchLoading').hide();
                    showError('Failed to load sales');
                }
            });
        }
        
        function renderSales(sales) {
            const tbody = $('#salesTableBody');
            tbody.empty();
            
            if (!sales || sales.length === 0) {
                tbody.html(`
                     <tr>
                        <td colspan="6" class="sales-empty-state">
                            <i class="fas fa-receipt"></i>
                            <p>No sales found</p>
                            <span>${currentKeyword ? 'No results for "' + escapeHtml(currentKeyword) + '"' : 'Start billing to see sales'}</span>
                         </tr>
                `);
                return;
            }
            
            sales.forEach(function(sale) {
                const statusClass = sale.status === 'COMPLETED' ? 'status-completed' : 'status-cancelled';
                const statusIcon = sale.status === 'COMPLETED' ? 'fa-check-circle' : 'fa-times-circle';
                
                const row = `
                    <tr>
                        <td><span class="invoice-number">#${sale.id}</span></td>
                        <td><i class="far fa-calendar"></i> ${formatDate(sale.saleDate)}</td>
                        <td><i class="fas fa-user"></i> ${escapeHtml(sale.customerName || 'Walk-in')}</td>
                         <td><i class="far fa-user-circle"></i> ${escapeHtml(sale.cashierName || 'N/A')}</td>
                        <td><span class="sale-amount">₹${formatNumber(sale.totalAmount)}</span></td>
                        <td>
                            <span class="status-badge ${statusClass}">
                                <i class="fas ${statusIcon}"></i> ${sale.status}
                            </span>
                        </td>
                        <td>
                            <div class="sales-action-buttons">
                                <a href="/sales/invoice/${sale.id}" target="_blank" class="sales-btn-view" title="View Invoice">
                                    <i class="fas fa-file-invoice"></i>
                                </a>
                                ${sale.status === 'COMPLETED' ? `
                                    <a href="/sales/cancel/${sale.id}" class="sales-btn-cancel" 
                                       onclick="return confirm('Cancel this sale?')" title="Cancel Sale">
                                        <i class="fas fa-ban"></i>
                                    </a>
                                ` : `
                                    <span class="sales-btn-cancelled disabled" title="Already cancelled">
                                        <i class="fas fa-ban"></i>
                                    </span>
                                `}
                            </div>
                        </td>
                    </tr>
                `;
                tbody.append(row);
            });
        }
        
        function renderPagination(data) {
            const container = $('#paginationContainer');
            container.empty();
            
            if (data.totalPages <= 1) return;
            
            let paginationHtml = '<div class="sales-pagination">';
            
            paginationHtml += `<button class="sales-pagination-btn" onclick="changePage(${data.currentPage - 1})" ${!data.hasPrevious ? 'disabled' : ''}>
                <i class="fas fa-chevron-left"></i>
            </button>`;
            
            const startPage = Math.max(0, data.currentPage - 2);
            const endPage = Math.min(data.totalPages - 1, data.currentPage + 2);
            
            if (startPage > 0) {
                paginationHtml += `<button class="sales-pagination-btn" onclick="changePage(0)">1</button>`;
                if (startPage > 1) paginationHtml += `<span class="pagination-dots">...</span>`;
            }
            
            for (let i = startPage; i <= endPage; i++) {
                const activeClass = i === data.currentPage ? 'active' : '';
                paginationHtml += `<button class="sales-pagination-btn ${activeClass}" onclick="changePage(${i})">${i + 1}</button>`;
            }
            
            if (endPage < data.totalPages - 1) {
                if (endPage < data.totalPages - 2) paginationHtml += `<span class="pagination-dots">...</span>`;
                paginationHtml += `<button class="sales-pagination-btn" onclick="changePage(${data.totalPages - 1})">${data.totalPages}</button>`;
            }
            
            paginationHtml += `<button class="sales-pagination-btn" onclick="changePage(${data.currentPage + 1})" ${!data.hasNext ? 'disabled' : ''}>
                <i class="fas fa-chevron-right"></i>
            </button>`;
            
            paginationHtml += '</div>';
            container.html(paginationHtml);
            
            const startItem = data.currentPage * data.pageSize + 1;
            const endItem = Math.min((data.currentPage + 1) * data.pageSize, data.totalItems);
            $('#paginationInfo').html(`
                Showing ${startItem} to ${endItem} of ${data.totalItems} sales
                ${currentKeyword ? ' · Searching: "' + escapeHtml(currentKeyword) + '"' : ''}
                ${currentStatus ? ' · ' + currentStatus : ''}
                ${currentDateRange ? ' · ' + currentDateRange : ''}
            `);
        }
        
        function changePage(page) {
            if (page === currentPage) return;
            currentPage = page;
            loadSales();
            $('.sales-card')[0].scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
        }
        
        function formatNumber(value) {
            if (!value) return '0';
            return parseFloat(value).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }
        
        function showError(message) {
            const errorDiv = $('<div>', { class: 'sales-toast-error', text: message }).appendTo('body');
            setTimeout(() => errorDiv.fadeOut(300, function() { $(this).remove(); }), 3000);
        }
    </script>
</body>

</html>
