<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:if="${user.id == null}">Add User • Expygen Admin</title>
    <title th:if="${user.id != null}">Edit User • Expygen Admin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Fonts & Icons -->    <link rel="stylesheet" th:href="@{/css/main/fonts.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" th:href="@{/css/core/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/core/themes.css}">
    <link rel="stylesheet" th:href="@{/css/core/base.css}">
    <link rel="stylesheet" th:href="@{/css/core/utilities.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/badges.css}">
    <link rel="stylesheet" th:href="@{/css/components/cards.css}">
    <link rel="stylesheet" th:href="@{/css/components/forms.css}">
    <link rel="stylesheet" th:href="@{/css/components/tables.css}">
    <link rel="stylesheet" th:href="@{/css/components/page-header.css}">
    <link rel="stylesheet" th:href="@{/css/components/stat-cards.css}">
    <link rel="stylesheet" th:href="@{/css/layouts/admin-shell.css}">
    <link rel="stylesheet" th:href="@{/css/admin/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/legacy-pages.css}">
    <link rel="stylesheet" th:href="@{/css/pages/admin-phase-a-bridge.css}">

</head>
<body class="theme-admin density-admin admin-shell">
    <!-- Sidebar -->
      <!-- ===== SIDEBAR WITH PROPER URLS ===== -->
    <div th:replace="~{admin/fragments/sidebar :: sidebar('users')}" ></div>

    <div class="admin-main main admin-shell-main">
        <!-- Header -->
        <div class="admin-header">
            <h1>
                <i class="fas fa-user-edit"></i>
                <span th:text="${user.id == null} ? 'Add New User' : 'Edit User'">User Form</span>
            </h1>
            <div class="admin-user">
                <span class="role-badge">ADMIN</span>
                <span th:text="${#authentication.name}">admin@expygen.com</span>
            </div>
        </div>
        
        <!-- Form Card -->
        <div class="form-card">
            <form th:action="@{/admin/users/save}" method="post">
                <!-- Hidden ID for edit -->
                <input type="hidden" name="id" th:value="${user.id}">
                
                <div class="form-grid">
                    <!-- Full Name -->
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Full Name *</label>
                        <input type="text" name="name" th:value="${user.name}" placeholder="John Doe" required>
                    </div>
                    
                    <!-- Email/Username -->
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email/Username *</label>
                        <input type="email" name="username" th:value="${user.username}" placeholder="john@example.com" required>
                    </div>
                    
                    <!-- Phone -->
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Phone *</label>
                        <input type="text" name="phone" th:value="${user.phone}" placeholder="9876543210" required>
                    </div>
                    
                    <!-- Password -->
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" name="password" 
                               th:placeholder="${user.id == null} ? 'Enter password' : 'Leave blank to keep current'"
                               th:required="${user.id == null}">
                    </div>
                    
                    <!-- Role -->
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Role *</label>
                        <select name="role" th:field="*{user.role}" required>
                            <option value="">Select Role</option>
                            <option value="OWNER" th:selected="${user.role == 'OWNER'}">Owner</option>
                            <option value="MANAGER" th:selected="${user.role == 'MANAGER'}">Manager</option>
                            <option value="CASHIER" th:selected="${user.role == 'CASHIER'}">Cashier</option>
                        </select>
                    </div>
                    
                    <!-- Shop -->
                    <div class="form-group">
                        <label><i class="fas fa-store"></i> Shop *</label>
                        <select name="shop.id" required>
                            <option value="">Select Shop</option>
                            <option th:each="shop : ${shops}" 
                                    th:value="${shop.id}" 
                                    th:text="${shop.name}"
                                    th:selected="${user.shop != null and user.shop.id == shop.id}">
                            </option>
                        </select>
                    </div>
                    
                    <!-- Active Status -->
                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" name="active" th:checked="${user.active != null ? user.active : true}">
                            <span>Active</span>
                        </label>
                    </div>
                    
                    <!-- Approved Status -->
                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" name="approved" th:checked="${user.approved != null ? user.approved : true}">
                            <span>Approved</span>
                        </label>
                    </div>
                </div>
                
                <!-- Form Actions -->
                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> 
                        <span th:text="${user.id == null} ? 'Save User' : 'Update User'">Save User</span>
                    </button>
                    <a th:href="@{/admin/users}" class="btn-secondary">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <div class="footer-left">
                <i class="fas fa-store"></i>
                <span>© 2026 Expygen</span>
                <span>·</span>
                <span>v2.0.0</span>
                <span>·</span>
                <span>Made with <span class="heart">❤️</span> in India</span>
            </div>
            <div class="footer-right">
                <span class="version"><i class="fas fa-circle" style="color: #10b981;"></i> Live</span>
            </div>
        </div>
    </div>
</body>
</html>
