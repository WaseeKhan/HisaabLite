<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login • Expygen</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #edf1f5 0%, #f8fafc 100%);
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 50%, rgba(47, 116, 218, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(242, 140, 40, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* ===== HEADER ===== */
        .admin-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.2);
            box-shadow: 0 1px 0 rgba(242, 140, 40, 0.28);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo-image {
            height: 38px;
            width: auto;
            display: block;
        }

        .header-logo-text {
            font-weight: 600;
            font-size: 14px;
            color: #23262b;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .customer-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: #f1f5f9;
            border-radius: 30px;
            color: #475569;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }

        .customer-link:hover {
            background: #2f74da;
            color: white;
            border-color: #2f74da;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px -1px rgba(47, 116, 218, 0.24);
        }

        .customer-link i {
            font-size: 12px;
        }

        .header-badge {
            background: linear-gradient(135deg, #2f74da, #225ab2);
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-badge i {
            font-size: 10px;
        }

        /* ===== MAIN CONTENT ===== */
        .admin-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .admin-login-container {
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-box {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.18);
            border: 1px solid rgba(220, 227, 235, 0.95);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            border-radius: 24px 24px 0 0;
            background: linear-gradient(90deg, #f28c28, #2f74da);
        }

        .logo {
            display: flex;
            align-items: center;
            margin-bottom: 32px;
            justify-content: center;
        }

        .logo-image {
            width: 240px;
            max-width: 100%;
            height: auto;
            display: block;
        }

        .logo-text {
            display: none;
        }

        h2 {
            font-size: 24px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 24px;
            text-align: center;
        }

        /* Alert Messages */
        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .alert-danger {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fee2e2;
        }

        .alert-success {
            background: #e6f7e6;
            color: #059669;
            border: 1px solid #bbf7d0;
        }

        .alert i {
            font-size: 18px;
        }

        /* ===== LOGIN AGAIN BUTTON ===== */
        .login-again-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.3);
            position: relative;
            overflow: hidden;
            margin-bottom: 16px;
            text-decoration: none;
        }

        .login-again-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .login-again-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(16, 185, 129, 0.4);
        }

        .login-again-btn:hover::before {
            left: 100%;
        }

        .login-again-btn i {
            font-size: 16px;
            transition: transform 0.2s;
        }

        .login-again-btn:hover i {
            transform: translateX(4px);
        }

        /* Form Styles */
        .login-form {
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            margin-bottom: 6px;
        }

        .form-group label i {
            color: #2f74da;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2f74da;
            background: white;
            box-shadow: 0 0 0 4px rgba(47, 116, 218, 0.1);
        }

        .form-group input::placeholder {
            color: #94a3b8;
            font-size: 13px;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2f74da, #225ab2);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 10px 20px -5px rgba(47, 116, 218, 0.28);
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(47, 116, 218, 0.36);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn i {
            font-size: 16px;
            transition: transform 0.2s;
        }

        .login-btn:hover i {
            transform: translateX(4px);
        }

        /* Security Note */
        .security-note {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding-top: 16px;
            border-top: 1px solid #f1f5f9;
        }

        .security-note i {
            color: #f28c28;
        }

        /* ===== FOOTER ===== */
        .admin-footer {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(226, 232, 240, 0.2);
            box-shadow: inset 0 1px 0 rgba(242, 140, 40, 0.24);
            padding: 16px 24px;
            position: relative;
            z-index: 10;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .footer-left i {
            color: #2f74da;
            font-size: 16px;
        }

        .footer-left span {
            font-size: 12px;
            color: #475569;
        }

        .heart {
            color: #ef4444;
            animation: heartbeat 1.5s ease infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .footer-right a {
            color: #64748b;
            text-decoration: none;
            font-size: 11px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .footer-right a:hover {
            color: #2f74da;
        }

        .footer-right a i {
            font-size: 10px;
        }

        .footer-version {
            background: #fff1e2;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 10px;
            color: #91520f;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .footer-version i {
            color: #f28c28;
            font-size: 8px;
        }

        /* Loading State */
        .login-btn.loading {
            background: #64748b;
            pointer-events: none;
            opacity: 0.7;
        }

        .login-btn.loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .footer-content {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
            
            .footer-right {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .header-logo-text {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 30px 20px;
            }
            
            .logo-image {
                width: 200px;
            }
            
            h2 {
                font-size: 20px;
            }
            
            .customer-link span {
                display: none;
            }
            
            .customer-link i {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header class="admin-header">
        <div class="header-left">
            <div class="header-logo">
                <img th:src="@{/images/expygen-logo-dark.png}" alt="Expygen" class="header-logo-image">
                <span class="header-logo-text">Expygen Admin</span>
            </div>
        </div>
        
        <div class="header-right">
            <!-- Link to Customer Site -->
            <a th:href="@{/}" class="customer-link" target="_blank">
                <i class="fas fa-store"></i>
                <span>Visit Customer Site</span>
                <i class="fas fa-external-link-alt" style="font-size: 10px;"></i>
            </a>
            
            <div class="header-badge">
                <i class="fas fa-shield-alt"></i>
                <span>Admin</span>
            </div>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="admin-main">
        <div class="admin-login-container">
            <div class="login-box">
                <div class="logo">
                    <img th:src="@{/images/expygen-logo-dark.png}" alt="Expygen Admin" class="logo-image">
                    <span class="logo-text">Admin Portal</span>
                </div>
                
                <h2>Welcome Back, Admin</h2>
                
                <!-- Error Message -->
                <div th:if="${error}" class="alert alert-danger">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${error}">Invalid username or password</span>
                </div>
              
                <div th:if="${message}" class="alert alert-success">
                    <i class="fas fa-check-circle"></i>
                    <span th:text="${message}">Logged out successfully</span>
                </div>
                
               
                <a th:if="${message}" th:href="@{/admin}" class="login-again-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Login Again
                </a>
                
               
                <form th:unless="${message}" method="post" th:action="@{/admin/login}" class="login-form" id="loginForm">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input type="text" 
                               id="username" 
                               name="username" 
                               placeholder="admin@expygen.com" 
                               
                               required 
                               autofocus>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" 
                               id="password" 
                               name="password" 
                               placeholder="••••••••" 
                               
                               required>
                    </div>
                    
                    <button type="submit" class="login-btn" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i>
                        Login to Admin Panel
                    </button>
                </form>
                
                
                <div class="security-note" th:unless="${message}">
                    <i class="fas fa-shield-alt"></i>
                    Secure Admin Access • 2FA Protected
                </div>
                
               
            </div>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="admin-footer">
        <div class="footer-content">
            <div class="footer-left">
                <i class="fas fa-store"></i>
                <span>© 2026 Expygen. All rights reserved.</span>
                <span>·</span>
                <span>Made with <span class="heart">❤️</span> in India</span>
            </div>
            
            <div class="footer-right">
                <a href="#" target="_blank">
                    <i class="fas fa-file-alt"></i> Privacy
                </a>
                <a href="#" target="_blank">
                    <i class="fas fa-gavel"></i> Terms
                </a>
                <a href="#" target="_blank">
                    <i class="fas fa-headset"></i> Support
                </a>
                <span class="footer-version">
                    <i class="fas fa-circle"></i>
                    <span th:text="'v' + ${@appConfig.appVersion}">v2.1.2</span>
                </span>
            </div>
        </div>
    </footer>

    <!-- Loading Animation Script -->
    <script>
        document.getElementById('loginForm')?.addEventListener('submit', function() {
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fas fa-spinner"></i> Authenticating...';
            btn.classList.add('loading');
        });

       
        setTimeout(function() {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                alert.style.transition = 'opacity 0.5s';
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 500);
            });
        }, 5000);
    </script>
</body>
</html>
