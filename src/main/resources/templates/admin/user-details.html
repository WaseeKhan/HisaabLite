<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Details • HisaabLite Admin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 200px;
            background: white;
            border-right: 1px solid #e2e8f0;
            padding: 16px 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding-left: 4px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: #2563eb;
            color: white;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
        }

        .logo-text {
            font-weight: 600;
            font-size: 13px;
            color: #0f172a;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .nav-links a {
            padding: 8px 10px;
            border-radius: 6px;
            text-decoration: none;
            color: #475569;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links a i {
            width: 16px;
            font-size: 12px;
            color: #64748b;
        }

        .nav-links a:hover {
            background: #f1f5f9;
            color: #2563eb;
        }

        .nav-links a.active {
            background: #eef2ff;
            color: #2563eb;
            font-weight: 600;
        }

        .logout-btn {
            width: 100%;
            padding: 8px 10px;
            background: #fef2f2;
            border: none;
            color: #dc2626;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        /* ===== MAIN CONTENT ===== */
        .admin-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            height: 100vh;
            padding: 12px 16px 0 16px;
        }

        .admin-header {
            background: white;
            padding: 8px 16px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e2e8f0;
            margin-bottom: 12px;
        }

        .admin-header h1 {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .admin-header h1 i {
            color: #2563eb;
        }

        .admin-user {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
        }

        .role-badge {
            background: #2563eb;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 9px;
        }

        /* ===== DETAILS CARD ===== */
        .details-card {
            background: white;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            padding: 24px;
            max-width: 700px;
            width: 100%;
            margin-bottom: 12px;
        }

        .details-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .user-avatar {
            font-size: 64px;
            color: #2563eb;
        }

        .user-title {
            flex: 1;
        }

        .user-title h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-owner { background: #fef3c7; color: #b45309; }
        .badge-manager { background: #dbeafe; color: #2563eb; }
        .badge-cashier { background: #d1fae5; color: #059669; }

        .status-badges {
            display: flex;
            gap: 8px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-active { background: #d1fae5; color: #059669; }
        .status-inactive { background: #fee2e2; color: #dc2626; }
        .status-approved { background: #d1fae5; color: #059669; }
        .status-pending { background: #fef3c7; color: #b45309; }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-item label {
            font-size: 10px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
        }

        .detail-item span {
            font-size: 14px;
            font-weight: 500;
            color: #0f172a;
        }

        .details-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .footer {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 6px 16px;
            margin: 0 -16px 0 -16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 8px;
            color: #94a3b8;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-left i {
            color: #2563eb;
        }

        .heart {
            color: #ef4444;
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .version {
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 7px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <div class="logo-icon">HL</div>
            <div class="logo-text">HisaabLite</div>
        </div>
        
        <div class="nav-links">
            <a th:href="@{/admin/dashboard}"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a th:href="@{/admin/users}" class="active"><i class="fas fa-users"></i> Users</a>
            <a th:href="@{/admin/shops}"><i class="fas fa-store"></i> Shops</a>
            <a th:href="@{/admin/subscriptions}"><i class="fas fa-credit-card"></i> Plans</a>
        </div>
        
        <form th:action="@{/admin/logout}" method="post">
            <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </form>
    </div>
    
    <!-- Main Content -->
    <div class="admin-main">
        <div class="admin-header">
            <h1>
                <i class="fas fa-user"></i>
                User Details
            </h1>
            <div class="admin-user">
                <span class="role-badge">ADMIN</span>
                <span th:text="${#authentication.name}">admin@hisaablite.com</span>
            </div>
        </div>
        
        <!-- User Details Card -->
        <div class="details-card" th:if="${user != null}">
            <div class="details-header">
                <div class="user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="user-title">
                    <h2 th:text="${user.name}">John Doe</h2>
                  
                    <span class="badge" th:text="${user.role}" 
                          th:classappend="${user.role == 'OWNER' ? 'badge-owner' : 
                                         (user.role == 'MANAGER' ? 'badge-manager' : 
                                         (user.role == 'CASHIER' ? 'badge-cashier' : ''))}">
                        OWNER
                    </span>
                </div>
                <div class="status-badges">
                    <span class="status-badge" th:text="${user.active ? 'Active' : 'Inactive'}"
                          th:classappend="${user.active} ? 'status-active' : 'status-inactive'">
                        Active
                    </span>
                    <span class="status-badge" th:text="${user.approved ? 'Approved' : 'Pending'}"
                          th:classappend="${user.approved} ? 'status-approved' : 'status-pending'">
                        Approved
                    </span>
                </div>
            </div>
            
            <div class="details-grid">
                <div class="detail-item">
                    <label>User ID</label>
                    <span th:text="${user.id}">1</span>
                </div>
                <div class="detail-item">
                    <label>Username / Email</label>
                    <span th:text="${user.username}">john@example.com</span>
                </div>
                <div class="detail-item">
                    <label>Phone</label>
                    <span th:text="${user.phone}">9876543210</span>
                </div>
                <div class="detail-item">
                    <label>Role</label>
                    <span th:text="${user.role}">OWNER</span>
                </div>
                <div class="detail-item">
                    <label>Shop</label>
                    <span th:text="${user.shop != null ? user.shop.name : 'N/A'}">Main Shop</span>
                </div>
                <div class="detail-item">
                    <label>Shop ID</label>
                    <span th:text="${user.shop != null ? user.shop.id : 'N/A'}">1</span>
                </div>
                <div class="detail-item">
                    <label>Created At</label>
                    <span th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy, hh:mm a')}">09 Mar 2026</span>
                </div>
                <div class="detail-item">
                    <label>Status</label>
                    <span th:text="${user.active ? 'Active' : 'Inactive'}">Active</span>
                </div>
            </div>
            
            <div class="details-actions">
                <a th:href="@{'/admin/users/edit/' + ${user.id}}" class="btn-primary">
                    <i class="fas fa-edit"></i> Edit User
                </a>
                <a th:href="@{/admin/users}" class="btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back to Users
                </a>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <div class="footer-left">
                <i class="fas fa-store"></i>
                <span>© 2026 HisaabLite</span>
                <span>·</span>
                <span>v2.0.0</span>
                <span>·</span>
                <span>Made with <span class="heart">❤️</span> in India</span>
            </div>
            <div class="footer-right">
                <span class="version"><i class="fas fa-circle" style="color: #10b981;"></i> Live</span>
            </div>
        </div>
    </div>
</body>
</html>
