<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Details • Expygen Admin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Fonts & Icons -->    <link rel="stylesheet" th:href="@{/css/main/fonts.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" th:href="@{/css/core/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/core/themes.css}">
    <link rel="stylesheet" th:href="@{/css/core/base.css}">
    <link rel="stylesheet" th:href="@{/css/core/utilities.css}">
    <link rel="stylesheet" th:href="@{/css/components/buttons.css}">
    <link rel="stylesheet" th:href="@{/css/components/badges.css}">
    <link rel="stylesheet" th:href="@{/css/components/cards.css}">
    <link rel="stylesheet" th:href="@{/css/components/forms.css}">
    <link rel="stylesheet" th:href="@{/css/components/tables.css}">
    <link rel="stylesheet" th:href="@{/css/components/page-header.css}">
    <link rel="stylesheet" th:href="@{/css/components/stat-cards.css}">
    <link rel="stylesheet" th:href="@{/css/layouts/admin-shell.css}">
    <link rel="stylesheet" th:href="@{/css/admin/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/legacy-pages.css}">
    <link rel="stylesheet" th:href="@{/css/pages/admin-phase-a-bridge.css}">

</head>
<body class="theme-admin density-admin admin-shell">
    <!-- Sidebar -->
    <div th:replace="~{admin/fragments/sidebar :: sidebar('users')}" ></div>

    <div class="admin-main main admin-shell-main">
        <div class="admin-header">
            <h1>
                <i class="fas fa-user"></i>
                User Details
            </h1>
            <div class="admin-user">
                <span class="role-badge">ADMIN</span>
                <span th:text="${#authentication.name}">admin@expygen.com</span>
            </div>
        </div>
        
        <!-- User Details Card -->
        <div class="details-card" th:if="${user != null}">
            <div class="details-header">
                <div class="user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="user-title">
                    <h2 th:text="${user.name}">John Doe</h2>
                  
                    <span class="badge" th:text="${user.role}" 
                          th:classappend="${user.role == 'OWNER' ? 'badge-owner' : 
                                         (user.role == 'MANAGER' ? 'badge-manager' : 
                                         (user.role == 'CASHIER' ? 'badge-cashier' : ''))}">
                        OWNER
                    </span>
                </div>
                <div class="status-badges">
                    <span class="status-badge" th:text="${user.active ? 'Active' : 'Inactive'}"
                          th:classappend="${user.active} ? 'status-active' : 'status-inactive'">
                        Active
                    </span>
                    <span class="status-badge" th:text="${user.approved ? 'Approved' : 'Pending'}"
                          th:classappend="${user.approved} ? 'status-approved' : 'status-pending'">
                        Approved
                    </span>
                </div>
            </div>
            
            <div class="details-grid">
                <div class="detail-item">
                    <label>User ID</label>
                    <span th:text="${user.id}">1</span>
                </div>
                <div class="detail-item">
                    <label>Username / Email</label>
                    <span th:text="${user.username}">john@example.com</span>
                </div>
                <div class="detail-item">
                    <label>Phone</label>
                    <span th:text="${user.phone}">9876543210</span>
                </div>
                <div class="detail-item">
                    <label>Role</label>
                    <span th:text="${user.role}">OWNER</span>
                </div>
                <div class="detail-item">
                    <label>Shop</label>
                    <span th:text="${user.shop != null ? user.shop.name : 'N/A'}">Main Shop</span>
                </div>
                <div class="detail-item">
                    <label>Shop ID</label>
                    <span th:text="${user.shop != null ? user.shop.id : 'N/A'}">1</span>
                </div>
                <div class="detail-item">
                    <label>Created At</label>
                    <span th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy, hh:mm a')}">09 Mar 2026</span>
                </div>
                <div class="detail-item">
                    <label>Status</label>
                    <span th:text="${user.active ? 'Active' : 'Inactive'}">Active</span>
                </div>
            </div>
            
            <div class="details-actions">
                <a th:href="@{'/admin/users/edit/' + ${user.id}}" class="btn-primary">
                    <i class="fas fa-edit"></i> Edit User
                </a>
                <a th:href="@{/admin/users}" class="btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back to Users
                </a>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <div class="footer-left">
                <i class="fas fa-store"></i>
                <span>© 2026 Expygen</span>
                <span>·</span>
                <span>v2.0.0</span>
                <span>·</span>
                <span>Made with <span class="heart">❤️</span> in India</span>
            </div>
            <div class="footer-right">
                <span class="version"><i class="fas fa-circle" style="color: #10b981;"></i> Live</span>
            </div>
        </div>
    </div>
</body>
</html>
