<!DOCTYPE html>

<head>
    <title>Page Not Found • HisaabLite Admin</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/admin/css/admin-styles.css}" rel="stylesheet">
