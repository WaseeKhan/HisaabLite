<div th:fragment="sidebar(activePage)" class="sidebar admin-shell-sidebar admin-sidebar">
    <div class="admin-sidebar-brand">
        <div class="logo">
            <div class="logo-icon">HL</div>
            <div class="logo-copy">
                <div class="logo-text">Expygen</div>
                <div class="logo-subtext">Admin Console</div>
            </div>
        </div>
        <div class="admin-sidebar-badge">
            <i class="fas fa-shield-halved"></i>
            <span>Super Admin Access</span>
        </div>
    </div>

    <div class="admin-nav-section">
        <div class="admin-sidebar-label">Core Workspace</div>
        <div class="nav-links">
            <a th:href="@{/admin/dashboard}" th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
                <i class="fas fa-chart-pie"></i>
                <span>Dashboard</span>
            </a>
            <a th:href="@{/admin/shops}" th:classappend="${activePage == 'shops'} ? ' active' : ''">
                <i class="fas fa-store"></i>
                <span>Shops</span>
            </a>
            <a th:href="@{/admin/users}" th:classappend="${activePage == 'users'} ? ' active' : ''">
                <i class="fas fa-users"></i>
                <span>Users</span>
            </a>
            <a th:href="@{/admin/subscriptions}" th:classappend="${activePage == 'subscriptions'} ? ' active' : ''">
                <i class="fas fa-credit-card"></i>
                <span>Subscriptions</span>
            </a>
        </div>
    </div>

    <div class="admin-nav-section">
        <div class="admin-sidebar-label">Commercial Ops</div>
        <div class="nav-links">
            <a th:href="@{/admin/upgrade-requests}" th:classappend="${activePage == 'commercial'} ? ' active' : ''">
                <i class="fas fa-arrow-trend-up"></i>
                <span>Commercial Console</span>
            </a>
            <a th:href="@{/admin/subscription-ledger}" th:classappend="${activePage == 'ledger'} ? ' active' : ''">
                <i class="fas fa-book-open"></i>
                <span>Subscription Ledger</span>
            </a>
        </div>
    </div>

    <div class="admin-nav-section">
        <div class="admin-sidebar-label">Support & Risk</div>
        <div class="nav-links">
            <a th:href="@{/admin/support}" th:classappend="${activePage == 'support'} ? ' active' : ''">
                <i class="fas fa-headset"></i>
                <span>Support</span>
            </a>
            <a th:href="@{/admin/audit}" th:classappend="${activePage == 'audit'} ? ' active' : ''">
                <i class="fas fa-clipboard-list"></i>
                <span>Audit Logs</span>
            </a>
            <a th:href="@{/admin/platform-health}" th:classappend="${activePage == 'health'} ? ' active' : ''">
                <i class="fas fa-heart-pulse"></i>
                <span>Platform Health</span>
            </a>
            <a th:href="@{/admin/contact-requests}" th:classappend="${activePage == 'contacts'} ? ' active' : ''">
                <i class="fas fa-address-book"></i>
                <span>Contact Requests</span>
            </a>
        </div>
    </div>

    <div class="quick-actions">
        <div class="quick-actions-title">Fast Actions</div>
        <a th:href="@{/admin/upgrade-requests}" class="quick-action-item">
            <i class="fas fa-bolt"></i>
            <span>Open Commercial Queue</span>
        </a>
        <a th:href="@{/admin/support?status=OPEN}" class="quick-action-item">
            <i class="fas fa-life-ring"></i>
            <span>Review Open Support</span>
        </a>
        <a th:href="@{/admin/shops/new}" class="quick-action-item">
            <i class="fas fa-store-alt"></i>
            <span>Create Shop</span>
        </a>
    </div>

    <form th:action="@{/admin/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i>
            Logout
        </button>
    </form>
</div>
