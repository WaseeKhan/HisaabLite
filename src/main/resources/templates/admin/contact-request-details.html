<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Contact Request Details • Expygen Admin</title>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Inter', sans-serif; background:#f8fafc; margin:0; color:#0f172a; }
        .container { max-width: 960px; margin: 32px auto; padding: 0 20px; }
        .back { margin-bottom: 16px; display:inline-block; color:#2563eb; text-decoration:none; }
        .card { background:#fff; border-radius:16px; padding:24px; box-shadow:0 10px 30px rgba(15,23,42,0.06); }
        .grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:16px; margin-bottom:24px; }
        .label { font-size:12px; color:#64748b; margin-bottom:6px; }
        .value { font-weight:600; }
        .message-box { background:#f8fafc; border-radius:12px; padding:18px; line-height:1.7; margin:20px 0; }
        .actions { margin-top:24px; display:flex; gap:12px; align-items:center; }
        select, button { padding:10px 14px; border-radius:10px; border:1px solid #cbd5e1; }
        button { background:#0f172a; color:#fff; border:none; cursor:pointer; }
        .badge { padding:5px 10px; border-radius:20px; font-size:12px; font-weight:600; display:inline-block; }
        .status-NEW { background:#fff7ed; color:#c2410c; }
        .status-CONTACTED { background:#eff6ff; color:#2563eb; }
        .status-CLOSED { background:#f1f5f9; color:#475569; }
    </style>
</head>
<body>
<div class="container">
    <a class="back" th:href="@{/admin/contact-requests}">← Back to Contact Requests</a>

    <div class="card">
        <h1>Contact Request #<span th:text="${request.id}">1</span></h1>
        <p>
            <span class="badge"
                  th:classappend="' status-' + ${request.status.name()}"
                  th:text="${request.status}">NEW</span>
        </p>

        <div class="grid">
            <div>
                <div class="label">Store Name</div>
                <div class="value" th:text="${request.storeName}">ABC Medical Store</div>
            </div>
            <div>
                <div class="label">Contact Person</div>
                <div class="value" th:text="${request.contactPerson}">Waseem Khan</div>
            </div>
            <div>
                <div class="label">Email</div>
                <div class="value" th:text="${request.email}">test@mail.com</div>
            </div>
            <div>
                <div class="label">Phone</div>
                <div class="value" th:text="${request.phone}">9999999999</div>
            </div>
            <div>
                <div class="label">Topic</div>
                <div class="value" th:text="${request.topic}">Product demo</div>
            </div>
            <div>
                <div class="label">Created At</div>
                <div class="value" th:text="${#temporals.format(request.createdAt, 'dd MMM yyyy, hh:mm a')}">14 Apr 2026</div>
            </div>
        </div>

        <div class="label">Message</div>
        <div class="message-box" th:text="${request.message}">
            Customer message goes here.
        </div>

        <form class="actions" th:action="@{'/admin/contact-requests/' + ${request.id} + '/status'}" method="post">
            <select name="status">
                <option th:each="status : ${statuses}"
                        th:value="${status}"
                        th:text="${status}"
                        th:selected="${status == request.status}">
                </option>
            </select>
            <button type="submit">Update Status</button>
        </form>
    </div>
</div>
</body>
</html>
