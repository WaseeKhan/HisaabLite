<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Page Not Found • Expygen Admin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/main/fonts.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #f8fbff;
            background:
                radial-gradient(circle at 20% 12%, rgba(124, 60, 255, .20), transparent 32%),
                radial-gradient(circle at 82% 18%, rgba(0, 212, 255, .16), transparent 34%),
                linear-gradient(180deg, #07111f 0%, #050d19 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .error-container {
            width: 100%;
            max-width: 620px;
        }

        .error-card {
            position: relative;
            overflow: hidden;
            padding: 42px;
            border-radius: 22px;
            border: 1px solid rgba(87, 129, 178, .24);
            background:
                radial-gradient(circle at top right, rgba(0, 212, 255, .14), transparent 36%),
                linear-gradient(180deg, rgba(11, 24, 43, .96), rgba(5, 13, 25, .98));
            box-shadow: 0 28px 80px rgba(0, 0, 0, .45);
            text-align: center;
        }

        .error-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
            background-size: 42px 42px;
            opacity: .45;
            pointer-events: none;
        }

        .error-card > * {
            position: relative;
            z-index: 1;
        }

        .error-code {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 34px;
            padding: 0 13px;
            border-radius: 999px;
            border: 1px solid rgba(251, 191, 36, .28);
            background: rgba(245, 158, 11, .10);
            color: #fbbf24;
            font-size: 11px;
            font-weight: 950;
            letter-spacing: .12em;
            text-transform: uppercase;
        }

        .error-icon-wrap {
            width: 86px;
            height: 86px;
            margin: 24px auto 18px;
            border-radius: 24px;
            display: grid;
            place-items: center;
            background: rgba(0, 212, 255, .10);
            border: 1px solid rgba(0, 212, 255, .22);
            box-shadow: 0 0 38px rgba(0, 212, 255, .16);
        }

        .error-icon {
            font-size: 38px;
            color: #6ee7ff;
        }

        h1 {
            margin: 0;
            font-size: 34px;
            line-height: 1.1;
            font-weight: 950;
            letter-spacing: -.04em;
            color: #f8fbff;
        }

        p {
            max-width: 440px;
            margin: 12px auto 26px;
            color: #8fa3bc;
            font-size: 14px;
            line-height: 1.7;
        }

        .btn-primary {
            min-height: 44px;
            padding: 0 17px;
            border-radius: 12px;
            border: 0;
            background: linear-gradient(135deg, #7c3cff, #1f6feb);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 950;
            box-shadow: 0 18px 40px rgba(31, 111, 235, .24);
            transition: .2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.08);
        }

        .error-help {
            margin-top: 18px;
            color: #64748b;
            font-size: 12px;
            font-weight: 800;
        }
    </style>
</head>

<body>
<div class="error-container">
    <div class="error-card">
        <span class="error-code">
            <i class="fas fa-triangle-exclamation"></i>
            Error 404
        </span>

        <div class="error-icon-wrap">
            <i class="fas fa-compass error-icon"></i>
        </div>

        <h1>Page Not Found</h1>

        <p>
            The admin route you are trying to access does not exist or may have been moved.
        </p>

        <a th:href="@{/admin/dashboard}" href="/admin/dashboard" class="btn-primary">
            <i class="fas fa-home"></i>
            Go to Dashboard
        </a>

        <div class="error-help">
            Expygen Admin Control Center
        </div>
    </div>
</div>
</body>
</html>
