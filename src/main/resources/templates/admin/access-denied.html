<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Access Denied • Expygen Admin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/admin/css/admin-styles.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="error-container">
        <div class="error-card">
            <i class="fas fa-lock error-icon"></i>
            <h1>403 - Access Denied</h1>
            <p>You don't have permission to access this page.</p>
            <a th:href="${#httpServletRequest != null and #httpServletRequest.isUserInRole('ADMIN')} ? @{/admin/dashboard} : @{/dashboard}" class="btn-primary">
                <i class="fas fa-home"></i> Go to Dashboard
            </a>
        </div>
    </div>
</body>
</html>
