<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login - HisaabLite</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">

      <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Main CSS -->
    <link rel="stylesheet" th:href="@{/css/main/variables.css}">
    <link rel="stylesheet" th:href="@{/css/main/reset.css}">
    <link rel="stylesheet" th:href="@{/css/main/layout.css}">

    <link rel="stylesheet" th:href="@{/css/components/public-header.css}">
    <link rel="stylesheet" th:href="@{/css/components/public-footer.css}">
    <!-- Page Specific CSS -->
    <link rel="stylesheet" th:href="@{/css/pages/login.css}">
    
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

</head>

<body>
 <div th:replace="~{fragments/public-header :: header}"></div>
    

    <!-- ===== MAIN CONTENT (COMPACT) ===== -->
    <div class="main-content">
        <div class="login-wrapper">
            <div class="login-card">
                
                <div class="login-header">
                    <h2>🔐 Welcome Back</h2>
                    <p>Login to your business account</p>
                </div>

                <!-- VERIFIED MESSAGE -->
                <div th:if="${param.verified}" class="message success">
                    <i class="fas fa-check-circle"></i>
                    <span>Account verified. Please login.</span>
                </div>

                <!-- LOGOUT MESSAGE -->
                <div th:if="${param.logout}" class="message info">
                    <span>✅ Logged out successfully.</span>
                </div>

                <!-- ERROR MESSAGE -->
                <div th:if="${param.error}" class="message error">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:if="${param.error[0] == 'bad'}">
                        ❌ Invalid username or password.
                    </span>
                    <span th:if="${param.error[0] != 'bad'}" th:text="${param.error[0]}"></span>
                </div>

                <!-- LOGIN FORM -->
                <form method="post" th:action="@{/login}">
                    
                    <div class="form-group">
                        <label>Username <span style="color: #dc2626;">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" name="username" placeholder="Enter username" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password <span style="color: #dc2626;">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" name="password" placeholder="••••••••" required />
                        </div>
                    </div>

                    <button type="submit" class="btn-login">
                        <i class="fas fa-arrow-right-to-bracket"></i> Login
                    </button>
                </form>

                <!-- LINKS SECTION -->
                <div class="links">
                    <a th:href="@{/register}" class="register-link">
                        <i class="fas fa-plus-circle"></i> Onboard Business
                    </a>
                    <span class="separator">|</span>
                    <a th:href="@{/forgot-password}" class="forgot-link">
                        <i class="fas fa-key"></i> Forgot Password?
                    </a>
                </div>

            </div>
        </div>
    </div>

   <div th:replace="~{fragments/public-footer :: footer}"></div>
</body>

</html>
