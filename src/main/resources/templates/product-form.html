<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${product.id != null} ? 'Edit Product • HisaabLite' : 'Add Product • HisaabLite'">
        Add Product • HisaabLite
    </title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <!-- Shop CSS -->
    <link rel="stylesheet" th:href="@{/css/main/shop-variables.css}">
    <link rel="stylesheet" th:href="@{/css/main/shop-reset.css}">
    <link rel="stylesheet" th:href="@{/css/main/shop-layout.css}">
    <link rel="stylesheet" th:href="@{/css/components/shop-sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components/shop-header.css}">
    <link rel="stylesheet" th:href="@{/css/components/shop-footer.css}">
    <link rel="stylesheet" th:href="@{/css/pages/shop-product-form.css}">
</head>

<body class="shop-body">

    <div class="shop-layout">
        <!-- Sidebar Fragment -->
        <div th:replace="~{fragments/shop-sidebar :: sidebar(shop=${shop}, role=${role}, currentPageName='products')}"></div>

        <!-- Main Content -->
        <div class="shop-main">
            <div class="shop-content-wrapper">

                <!-- Header Fragment -->
                <div th:replace="~{fragments/shop-header :: header}"></div>


                <!-- Product Form Card - Centered -->
                <div style="display: flex; justify-content: center;">
                    <div class="form-card">

                        <!-- Form Title -->
                        <div class="form-title">
                            <i class="fas" th:class="${product.id != null} ? 'fa-edit' : 'fa-plus-circle'"></i>
                            <span th:text="${product.id != null} ? 'Update Product Details' : 'Add New Product '">
                                Enter Product Details
                            </span>
                        </div>

                        <!-- Product Form -->
                        <form th:action="@{/products/save}" th:object="${product}" method="post">
                            <!-- Hidden ID for Update -->
                            <input type="hidden" th:field="*{id}" />

                            <div class="form-grid">

                                <!-- Product Name - Full Width -->
                                <div class="form-group full-width">
                                    <label><i class="fas fa-tag"></i> Product Name</label>
                                    <input type="text" th:field="*{name}" placeholder="Enter product name" required />
                                </div>

                                <!-- Price & GST in One Row -->
                                <div class="form-group">
                                    <label><i class="fas fa-rupee-sign"></i> Price (₹)</label>
                                    <div class="price-input-wrapper">
                                        <input type="number" step="0.01" th:field="*{price}" placeholder="0.00" required />
                                    </div>
                                     <div class="hint-text">
                                        <i class="fas fa-info-circle"></i> Price per quentity
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label><i class="fas fa-percent"></i> GST (%)</label>
                                    <select th:field="*{gstPercent}">
                                        <option value="0">0% (No GST)</option>
                                        <option value="5">5%</option>
                                        <option value="12">12%</option>
                                        <option value="18">18%</option>
                                        <option value="28">28%</option>
                                    </select>
                                    <div class="hint-text">
                                        <i class="fas fa-info-circle"></i> Applicable GST rate
                                    </div>
                                </div>

                                <!-- Stock & Minimum Stock - In One Line -->
                                <div class="stock-row">
                                    <div class="form-group">
                                        <label><i class="fas fa-boxes"></i> Stock Quantity</label>
                                        <input type="number" th:field="*{stockQuantity}" placeholder="0" required />
                                        <div class="hint-text">
                                            <i class="fas fa-info-circle"></i> Current available stock
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label><i class="fas fa-exclamation-triangle"></i> Min Stock Alert</label>
                                        <input type="number" th:field="*{minStock}" placeholder="5" />
                                        <div class="hint-text">
                                            <i class="fas fa-bell"></i> Alert when below this
                                        </div>
                                    </div>
                                </div>

                            </div>

                            <!-- Action Buttons - Centered -->
                            <div class="action-buttons">
                                <button type="submit" class="btn-primary">
                                    <i class="fas fa-save"></i>
                                    <span th:text="${product.id != null} ? 'Update Product' : 'Save Product'">Save Product</span>
                                </button>
                                <a th:href="@{/products}" class="btn-secondary">
                                    <i class="fas fa-times"></i> Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>

            </div>

            <!-- Footer Fragment -->
            <div th:replace="~{fragments/shop-footer :: footer}"></div>
        </div>
    </div>

    <script>
        // Auto-focus on first input
        document.addEventListener('DOMContentLoaded', function() {
            const firstInput = document.querySelector('input[type="text"]');
            if (firstInput) {
                firstInput.focus();
            }
        });
        
        // Format number inputs on blur
        const priceInput = document.querySelector('input[name="price"]');
        if (priceInput) {
            priceInput.addEventListener('blur', function() {
                if (this.value) {
                    this.value = parseFloat(this.value).toFixed(2);
                }
            });
        }
    </script>

</body>

</html>
